<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Eylox — Obby 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000000;overflow:hidden;font-family:'Nunito',sans-serif}
canvas{display:block}

/* ─── HUD ─── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;font-family:'Fredoka One',cursive}
.pill{
  background:rgba(0,0,0,.58);backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.18);border-radius:16px;
  padding:7px 18px;color:#fff;display:flex;align-items:center;gap:8px;
  font-size:1rem;white-space:nowrap
}
.pill .val{font-size:1.3rem;color:#FFD700}
#hud-top{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:center;
  padding:14px 16px;gap:12px
}
#hud-right{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end}

/* Back */
#back-btn{
  position:fixed;top:14px;left:14px;z-index:50;pointer-events:all;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(167,139,250,.5);
  color:#c4b5fd;border-radius:12px;padding:7px 16px;
  cursor:pointer;font-family:'Fredoka One',cursive;font-size:.95rem;
  transition:all .18s;text-decoration:none;display:inline-block
}
#back-btn:hover{background:rgba(124,58,237,.7);color:#fff}

/* Checkpoint banner */
#cp-banner{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:linear-gradient(135deg,#6A0DAD,#a855f7);
  color:#fff;border-radius:22px;padding:18px 44px;
  font-size:2rem;font-family:'Fredoka One',cursive;
  display:none;z-index:200;box-shadow:0 0 60px rgba(168,85,247,.8);
  pointer-events:none
}
#cp-banner.show{display:block;animation:cpPop .6s ease forwards}
@keyframes cpPop{
  0%  {transform:translate(-50%,-50%) scale(.5);opacity:0}
  60% {transform:translate(-50%,-50%) scale(1.08);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Death flash */
#death-flash{position:fixed;inset:0;background:rgba(220,0,0,.45);display:none;z-index:300;pointer-events:none}

/* Win screen */
#win-screen{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:400;color:#fff;font-family:'Fredoka One',cursive;
  backdrop-filter:blur(12px)
}
#win-screen h1{font-size:clamp(2.4rem,8vw,4.5rem);color:#FFD700;text-shadow:0 0 40px #FFD700;margin-bottom:14px}
.win-stat{font-size:1.4rem;margin:5px 0;color:#d8b4fe}
.win-stat span{color:#fff}
#win-btns{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.wbtn{
  padding:13px 38px;border:none;border-radius:16px;
  font-size:1.15rem;font-family:'Fredoka One',cursive;
  cursor:pointer;transition:transform .18s;pointer-events:all
}
.wbtn.p{background:linear-gradient(135deg,#6A0DAD,#a855f7);color:#fff;box-shadow:0 4px 24px rgba(168,85,247,.5)}
.wbtn.s{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#d8b4fe}
.wbtn:hover{transform:scale(1.06)}

/* Progress bar */
#prog-wrap{position:fixed;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,.12);z-index:20;pointer-events:none}
#prog-bar{height:100%;width:0;transition:width .6s ease;background:linear-gradient(90deg,#6A0DAD,#FFD700,#4ECDC4)}

/* Mobile controls */
#mob-ctrl{
  position:fixed;bottom:18px;left:0;right:0;
  display:none;justify-content:space-between;align-items:flex-end;
  padding:0 18px;z-index:20;pointer-events:none
}
@media(pointer:coarse){#mob-ctrl{display:flex}}
#joy-zone{
  width:120px;height:120px;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);
  border-radius:50%;position:relative;pointer-events:all;flex-shrink:0
}
#joy-knob{
  width:48px;height:48px;
  background:rgba(255,255,255,.45);border:2px solid rgba(255,255,255,.75);
  border-radius:50%;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none
}
#jump-mob{
  width:80px;height:80px;
  background:rgba(255,215,0,.65);border:3px solid #FFD700;
  border-radius:50%;color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.15rem;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent
}
#jump-mob:active{transform:scale(.92)}

/* Controls hint */
#ctrl-hint{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.35);font-size:.65rem;font-weight:700;
  pointer-events:none;white-space:nowrap;z-index:5
}
@media(pointer:coarse){#ctrl-hint{display:none}}
/* Pause overlay */
#pause-scr{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(10px);font-family:'Fredoka One',cursive;color:#fff}
#pause-scr h2{font-size:2.8rem;color:#FFD700;margin-bottom:6px;text-shadow:0 0 28px rgba(255,215,0,.5)}
#pause-scr p{color:rgba(255,255,255,.5);margin-bottom:24px;font-size:.9rem}
.pscr-btn{padding:13px 44px;border:none;border-radius:16px;font-size:1.15rem;font-family:'Fredoka One',cursive;cursor:pointer;transition:transform .18s;margin:5px;pointer-events:all;display:block;width:230px;text-align:center}
.pscr-btn.res{background:linear-gradient(135deg,#6A0DAD,#a855f7);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.45)}
.pscr-btn.qut{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#d8b4fe}
.pscr-btn:hover{transform:scale(1.05)}
#pfab{position:fixed;top:14px;right:130px;z-index:50;pointer-events:all;background:rgba(0,0,0,.65);border:1.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.75);border-radius:12px;padding:7px 13px;cursor:pointer;font-size:.95rem;font-family:'Fredoka One',cursive;transition:all .18s}
#pfab:hover{background:rgba(80,80,80,.7);color:#fff}
/* Coin/boost toasts */
@keyframes cfl3d{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-54px)}}
.ct3d{position:fixed;bottom:200px;left:50%;z-index:300;font-family:'Fredoka One',cursive;font-size:1.05rem;pointer-events:none;animation:cfl3d 1.4s ease-out forwards;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.5)}
/* Boost flash */
@keyframes boostFlash{0%{opacity:.3}100%{opacity:0}}
#boost-flash{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(255,220,0,.35) 0%,transparent 70%);pointer-events:none;z-index:250;display:none}
</style>
<script src="audit-loader.js" defer></script>
  <script src="debug-dashboard.js" defer></script>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="games.html">← Games</a>

<div id="hud">
  <div id="hud-top">
    <div class="pill">🏁 CP&nbsp;<span class="val" id="hud-cp">0/5</span></div>
    <div class="pill">⏱&nbsp;<span class="val" id="hud-time">0:00</span></div>
  </div>
  <div id="hud-right">
    <div class="pill">🪙&nbsp;<span class="val" id="hud-coins">0</span></div>
    <div class="pill" id="hud-pb-wrap" style="display:none">🏆&nbsp;<span style="font-size:.68rem;color:rgba(255,255,255,.55)">BEST&nbsp;</span><span class="val" id="hud-pb">—</span></div>
    <div class="pill" id="hud-boost-pill" style="display:none;background:rgba(245,158,11,.25);border-color:rgba(245,158,11,.5);color:#fde68a">⚡&nbsp;<span class="val" id="hud-boost-timer">2×</span></div>
  </div>
</div>

<div id="cp-banner">🏁 Checkpoint <span id="cp-num">1</span>! ✅</div>
<div id="death-flash"></div>
<div id="boost-flash"></div>
<button id="pfab" onclick="togglePause()">⏸</button>
<div id="pause-scr">
  <h2>⏸ PAUSED</h2>
  <p>Press P or tap Resume to continue</p>
  <button class="pscr-btn res" onclick="togglePause()">▶ Resume</button>
  <button class="pscr-btn qut" onclick="location.href='games.html'">← Quit to Games</button>
</div>

<div id="win-screen">
  <h1>🎉 YOU WIN!</h1>
  <p class="win-stat">Time: <span id="w-time">—</span></p>
  <p class="win-stat">Coins Collected: <span id="w-coins">—</span> 🪙</p>
  <p class="win-stat">Checkpoints: <span id="w-cp">—</span></p>
  <p class="win-stat" id="w-pb-line" style="display:none">🏆 <span id="w-pb-txt" style="color:#FFD700"></span></p>
  <p class="win-stat" id="w-streak-line" style="display:none">🔥 Streak Bonus: +<span id="w-streak-val">0</span> 🪙</p>
  <div id="win-btns">
    <button class="wbtn p" onclick="location.reload()">🔄 Play Again</button>
    <button class="wbtn s" id="w-share-btn">📣 Share</button>
    <button class="wbtn s" onclick="location.href='games.html'">← Games</button>
  </div>
</div>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<div id="mob-ctrl">
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="jump-mob">JUMP</div>
</div>

<div id="ctrl-hint">WASD / Arrows — Move &nbsp;|&nbsp; SPACE — Jump (double jump!) &nbsp;|&nbsp; Mouse — Camera</div>

<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════════════
// RENDERER + SCENE
// ════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xA8D8F0, 70, 320);

const camera = new THREE.PerspectiveCamera(68, 1, 0.1, 600);
camera.position.set(0, 12, 16);

function onResize() {
  const w = innerWidth, h = innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
onResize();

// ─── Procedural textures (256px high-quality) ───
function makeTexture(col) {
  const S = 256;
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  const r = (col >> 16) & 255, g = (col >> 8) & 255, b = col & 255;
  const C = (dr,dg,db,a=1) => `rgba(${Math.min(255,Math.max(0,r+dr))},${Math.min(255,Math.max(0,g+dg))},${Math.min(255,Math.max(0,b+db))},${a})`;

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, S, S);

  if (g > r * 1.1 && g > b * 1.1) {
    // ── GRASS: organic noise + moss + flowers ──
    for (let py = 0; py < S; py++) {
      for (let px = 0; px < S; px += 2) {
        const n = (Math.sin(px * 0.11 + py * 0.07) * Math.cos(py * 0.09 - px * 0.05)) * 22;
        ctx.fillStyle = C(n|0, (n*.5)|0, 0, 1);
        ctx.fillRect(px, py, 2, 1);
      }
    }
    for (let i = 0; i < 60; i++) {
      const px=(i*53+i*i*7)%S, py=(i*71+i*3)%S, s=-30+(i%4)*8;
      ctx.fillStyle = C(s, s-15, 0, 0.28);
      ctx.beginPath(); ctx.ellipse(px, py, 5+i%7, 3+i%4, (i*.4)%Math.PI, 0, Math.PI*2); ctx.fill();
    }
    for (let i = 0; i < 18; i++) {
      const px=(i*97+25)%(S-4), py=(i*71+18)%(S-4);
      ctx.fillStyle = [' rgba(255,255,160,0.6)','rgba(255,150,150,0.45)','rgba(160,230,255,0.45)'][i%3];
      ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(px-1, py-1, 1, 0, Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle='rgba(0,0,0,0.045)'; ctx.lineWidth=0.6;
    for(let i=0;i<S;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,S);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(S,i);ctx.stroke();}

  } else if (b > r * 1.15 && b > g) {
    // ── ICE: crystalline facets + frosted sheen ──
    ctx.fillStyle='rgba(210,235,255,0.32)'; ctx.fillRect(0,0,S,S);
    const pts=Array.from({length:10},(_,i)=>({x:(i*79+44)%S,y:(i*67+22)%S}));
    ctx.strokeStyle='rgba(140,200,255,0.75)'; ctx.lineWidth=1.2;
    pts.forEach((a,i)=>{const b2=pts[(i+1)%pts.length];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.stroke();});
    ctx.strokeStyle='rgba(200,230,255,0.4)'; ctx.lineWidth=0.6;
    pts.forEach((a,i)=>{const b2=pts[(i+3)%pts.length];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.stroke();});
    for(let i=0;i<30;i++){const px=(i*79)%S,py=(i*61)%S;ctx.fillStyle=`rgba(255,255,255,${0.15+i%4*.07})`;ctx.beginPath();ctx.arc(px,py,1+i%3,0,Math.PI*2);ctx.fill();}
    const gd=ctx.createLinearGradient(0,0,S,S);
    gd.addColorStop(0,'rgba(255,255,255,0.28)');gd.addColorStop(.5,'rgba(100,160,255,0.04)');gd.addColorStop(1,'rgba(160,210,255,0.2)');
    ctx.fillStyle=gd; ctx.fillRect(0,0,S,S);

  } else if (r > g * 1.5 && b < 90) {
    // ── LAVA / ORANGE: glowing crack network ──
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,S,S);
    const segs=[{x:0,y:S*.4},{x:S*.2,y:S*.2},{x:S*.5,y:S*.05},{x:S*.75,y:S*.35},{x:S,y:S*.55},{x:S*.85,y:S},{x:S*.4,y:S*.9},{x:S*.1,y:S*.75},{x:0,y:S*.4}];
    ctx.shadowColor=`rgb(255,${Math.min(255,g*2+60)},0)`; ctx.shadowBlur=12;
    ctx.strokeStyle=`rgba(255,${Math.min(255,g+100)},20,0.95)`; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(segs[0].x,segs[0].y);
    segs.slice(1).forEach((p,i)=>{const prev=segs[i];ctx.bezierCurveTo(prev.x+18,prev.y+22,p.x-18,p.y-18,p.x,p.y);});
    ctx.stroke();
    ctx.strokeStyle=`rgba(255,220,0,0.6)`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(segs[0].x,segs[0].y);
    segs.slice(1).forEach((p,i)=>{const prev=segs[i];ctx.bezierCurveTo(prev.x+18,prev.y+22,p.x-18,p.y-18,p.x,p.y);});
    ctx.stroke(); ctx.shadowBlur=0;
    for(let py=0;py<S;py+=10) for(let px=0;px<S;px+=10){const n=((px*7+py*13)%30)-15;ctx.fillStyle=`rgba(0,0,0,${0.08+Math.abs(n)/80})`;ctx.fillRect(px,py,10,10);}

  } else if (b > g && r < b * 1.3) {
    // ── PURPLE / CRYSTAL: gem facets ──
    const gd=ctx.createLinearGradient(0,0,S,S);
    gd.addColorStop(0,`rgba(${Math.min(255,r+80)},${g+25},${Math.min(255,b+70)},0.55)`);
    gd.addColorStop(.38,'rgba(255,255,255,0.18)');gd.addColorStop(.65,'rgba(0,0,0,0.18)');
    gd.addColorStop(1,`rgba(${r},${g},${Math.min(255,b+50)},0.35)`);
    ctx.fillStyle=gd; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.9;
    for(let i=-S;i<S*2;i+=28){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+S,S);ctx.stroke();}
    ctx.strokeStyle='rgba(200,150,255,0.18)'; ctx.lineWidth=0.6;
    for(let i=-S;i<S*2;i+=14){ctx.beginPath();ctx.moveTo(i,S);ctx.lineTo(i+S,0);ctx.stroke();}
    const rg=ctx.createRadialGradient(S*.5,S*.35,0,S*.5,S*.35,S*.55);
    rg.addColorStop(0,'rgba(255,255,255,0.22)');rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,S,S);

  } else if (r>55&&r<175&&g>28&&g<115&&b<68) {
    // ── WOOD / PLANK: realistic grain + knot ──
    for(let py=0;py<S;py++){
      const n=Math.sin(py*0.15+Math.sin(py*0.04)*6)*16+Math.sin(py*0.55)*5;
      ctx.fillStyle=`rgb(${Math.min(255,r+(n|0))},${Math.min(255,g+((n*.55)|0))},${b})`;
      ctx.fillRect(0,py,S,1);
    }
    ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=2;
    [S*.33,S*.67].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(S,y);ctx.stroke();});
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.ellipse(S*.62,S*.38,20,11,0.28,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(S*.62,S*.38,12,6,0.28,0,Math.PI*2); ctx.stroke();
    const gd=ctx.createLinearGradient(0,0,S,0);
    gd.addColorStop(0,'rgba(255,255,255,0.06)');gd.addColorStop(.5,'rgba(0,0,0,0.04)');gd.addColorStop(1,'rgba(255,255,255,0.06)');
    ctx.fillStyle=gd; ctx.fillRect(0,0,S,S);

  } else if (r>75&&r<165&&g>75&&g<165&&b>75&&b<165) {
    // ── STONE / COBBLE: crisp brickwork with mortar shadow ──
    const bw=48, bh=24;
    ctx.strokeStyle='rgba(0,0,0,0.0)'; ctx.lineWidth=0;
    for(let row=0;row<S/bh+1;row++){
      const off=row%2===0?0:bw/2;
      for(let col=-1;col<S/bw+1;col++){
        const bx=col*bw+off, by=row*bh;
        const shade=((col*3+row*7)%34)-17;
        ctx.fillStyle=C(shade,shade,shade);
        ctx.fillRect(bx+3,by+3,bw-6,bh-6);
      }
    }
    ctx.fillStyle=C(18,18,18); ctx.fillRect(0,0,S,S);
    for(let row=0;row<S/bh+1;row++){
      const off=row%2===0?0:bw/2;
      for(let col=-1;col<S/bw+1;col++){
        const bx=col*bw+off, by=row*bh;
        const shade=((col*3+row*7)%34)-17;
        ctx.fillStyle=C(shade,shade,shade);
        ctx.fillRect(bx+3,by+3,bw-6,bh-6);
        ctx.fillStyle='rgba(255,255,255,0.07)';
        ctx.fillRect(bx+3,by+3,bw-6,3);
        ctx.fillStyle='rgba(0,0,0,0.1)';
        ctx.fillRect(bx+3,by+bh-6,bw-6,3);
      }
    }
    const gd=ctx.createLinearGradient(0,0,0,S);
    gd.addColorStop(0,'rgba(255,255,255,0.06)');gd.addColorStop(1,'rgba(0,0,0,0.07)');
    ctx.fillStyle=gd; ctx.fillRect(0,0,S,S);

  } else if (r>g*1.2&&r>b*1.2&&g>b) {
    // ── SAND / DIRT: multi-scale grain ──
    for(let i=0;i<2000;i++){
      const px=(i*73+i*i*3)%S, py=(i*61+i*7)%S, shade=((i*17)%52)-26;
      ctx.fillStyle=C(shade,shade*0.7|0,0,0.5);
      ctx.beginPath(); ctx.arc(px,py,0.7+i%2,0,Math.PI*2); ctx.fill();
    }
    for(let i=0;i<200;i++){
      const px=(i*137)%S, py=(i*113)%S;
      ctx.fillStyle=C(15,8,0,0.25);
      ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
    }

  } else if (r>175&&g<65&&b>175) {
    // ── NEON / MAGIC: glow grid ──
    const rg=ctx.createRadialGradient(S/2,S/2,0,S/2,S/2,S*.72);
    rg.addColorStop(0,'rgba(255,255,255,0.32)');rg.addColorStop(1,'rgba(0,0,0,0.28)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.9;
    for(let i=0;i<S;i+=22){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,S);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(S,i);ctx.stroke();}
    for(let y=0;y<S;y+=22) for(let x=0;x<S;x+=22){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(0,0,S,S);

  } else {
    // ── GOLD / METAL: directional sheen + fine lines ──
    const gd=ctx.createLinearGradient(0,0,S,S);
    gd.addColorStop(0,'rgba(255,255,200,0.5)');gd.addColorStop(.32,'rgba(200,150,0,0.0)');
    gd.addColorStop(.65,'rgba(140,95,0,0.14)');gd.addColorStop(1,'rgba(255,240,120,0.38)');
    ctx.fillStyle=gd; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(255,235,80,0.16)'; ctx.lineWidth=0.5;
    for(let i=0;i<S;i+=5){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(S,i);ctx.stroke();}
    const rg=ctx.createRadialGradient(S*.35,S*.3,0,S*.35,S*.3,S*.5);
    rg.addColorStop(0,'rgba(255,255,200,0.22)');rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,S,S);
  }

  // ── AO border (ambient occlusion simulation) ──
  const ao=ctx.createRadialGradient(S*.5,S*.5,S*.22,S*.5,S*.5,S*.76);
  ao.addColorStop(0,'rgba(0,0,0,0)'); ao.addColorStop(1,'rgba(0,0,0,0.26)');
  ctx.fillStyle=ao; ctx.fillRect(0,0,S,S);

  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

    u.coins = Math.min((u.coins || 0) + totalCoins, 1e9);
    localStorage.setItem('eylox_user', JSON.stringify(u));
    /* Save real score to leaderboard */
    try { const lb=JSON.parse(localStorage.getItem('eylox_lb_entries')||'[]'); const prevBest=lb.filter(e=>e.user===u.username&&e.gameId==='obby-world-3d').reduce((b,e)=>Math.max(b,e.score),0); lb.push({user:u.username,avatar:u.avatar||'🎮',score:totalCoins,game:'Obby World 3D',gameId:'obby-world-3d',ts:Date.now()}); localStorage.setItem('eylox_lb_entries',JSON.stringify(lb.slice(-300))); if(totalCoins>prevBest){u.wins=(u.wins||0)+1;localStorage.setItem('eylox_user',JSON.stringify(u));localStorage.setItem('eylox_userdata_'+u.username,JSON.stringify(u));} } catch {}
    const entry = { id:'obby-world-3d', title:'Obby World 3D', thumb:'🏃‍♂️', genre:'action', playedAt: Date.now() };
    const r = JSON.parse(localStorage.getItem('eylox_recently_played') || '[]');
    r.unshift(entry); localStorage.setItem('eylox_recently_played', JSON.stringify(r.slice(0, 10)));
    localStorage.setItem('eylox_pending_notif', JSON.stringify({ title:'🏃‍♂️ Obby World Cleared!', body:`Finished in ${fmt(gameTime)} and earned ${totalCoins} Eylux!`, type:'game', ts:Date.now() }));
  } catch {}
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
const clock = new THREE.Clock();
let animT = 0;

(function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), .05);
  if (!gameWon && !isDead && !gamePaused) update(dt);
  renderer.render(scene, camera);
})();

function update(dt){
  gameTime += dt;

  // CP banner countdown
  if(cpBannerT>0){cpBannerT-=dt;if(cpBannerT<=0)document.getElementById('cp-banner').className='';}

  // ─── Input direction ───
  const mx = (keys.has('KeyD')||keys.has('ArrowRight')?1:0)-(keys.has('KeyA')||keys.has('ArrowLeft')?1:0)+joyX;
  const mz = (keys.has('KeyS')||keys.has('ArrowDown') ?1:0)-(keys.has('KeyW')||keys.has('ArrowUp')  ?1:0)+joyY;

  const camF = new THREE.Vector3(-Math.sin(camTheta),0,-Math.cos(camTheta));
  const camR = new THREE.Vector3( Math.cos(camTheta),0,-Math.sin(camTheta));
  const wish = camR.clone().multiplyScalar(mx).add(camF.clone().multiplyScalar(-mz));
  wish.y=0;

  speedBoostTimer = Math.max(0, speedBoostTimer - dt);
  const curSpeed = speedBoostTimer > 0 ? SPEED * 2.0 : SPEED;

  const moving = wish.lengthSq()>.001;
  if(moving){
    wish.normalize();
    vel.x=wish.x*curSpeed; vel.z=wish.z*curSpeed;
    const ta=Math.atan2(wish.x,wish.z);
    let diff=ta-avatar.rotation.y;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    avatar.rotation.y+=diff*.2;
  }else{
    vel.x*=FRICTION; vel.z*=FRICTION;
  }

  // ─── Jump ───
  const wj=keys.has('Space');
  if(wj&&!jumpHeld){
    if(onGround||coyoteTimer>0){vel.y=JUMP_V;onGround=false;canDJ=true;coyoteTimer=0;}
    else if(canDJ){vel.y=DJ_V;canDJ=false;}
    jumpHeld=true;
  }
  if(!wj) jumpHeld=false;

  // ─── Gravity + integrate ───
  const prevVelY = vel.y;
  vel.y+=GRAVITY*dt;
  avatar.position.addScaledVector(vel,dt);

  // ─── Update moving platforms ───
  movingPlatforms.forEach(mp=>{
    mp.t+=dt;
    const off=Math.sin(mp.t*mp.def.move.spd)*mp.def.move.range;
    const prev=Math.sin((mp.t-dt)*mp.def.move.spd)*mp.def.move.range;
    const delta=off-prev;
    switch(mp.def.move.axis){
      case 'x': mp.mesh.position.x=mp.base.x+off; if(mp.carrying) avatar.position.x+=delta; break;
      case 'z': mp.mesh.position.z=mp.base.z+off; if(mp.carrying) avatar.position.z+=delta; break;
      case 'y': mp.mesh.position.y=mp.base.y+Math.abs(off); break;
    }
    mp.carrying=false;
  });

  // ─── Ground raycast (5-point sweep) ───
  const wasOnGround = onGround;
  onGround=false;
  let bestY=-Infinity, bestMesh=null;
  [[.3,.3],[-.3,.3],[.3,-.3],[-.3,-.3],[0,0]].forEach(([ox,oz])=>{
    downRay.set(
      new THREE.Vector3(avatar.position.x+ox, avatar.position.y+.4, avatar.position.z+oz),
      new THREE.Vector3(0,-1,0)
    );
    const hits=downRay.intersectObjects(collidables,false);
    if(hits.length>0&&hits[0].distance<.72&&hits[0].point.y>bestY){bestY=hits[0].point.y;bestMesh=hits[0].object;}
  });

  if(bestMesh&&vel.y<=.08){
    onGround=true;
    avatar.position.y=bestY;
    vel.y=0; canDJ=false;
    const mp=movingPlatforms.find(m=>m.mesh===bestMesh);
    if(mp) mp.carrying=true;
    if(bestMesh.userData.finish&&!gameWon){gameWon=true;setTimeout(showWin,400);}
    if(bestMesh.userData.boost&&speedBoostTimer<=0){speedBoostTimer=2.5;showBoostEffect();}
  }

  // ─── Coyote time ───
  if(!onGround&&wasOnGround&&vel.y<=0) coyoteTimer=COYOTE_TIME;
  else if(onGround) coyoteTimer=0;
  else coyoteTimer=Math.max(0,coyoteTimer-dt);

  // ─── Landing effects ───
  if(!wasOnGround&&onGround&&prevVelY<-5){
    const impact=-prevVelY;
    if(impact>8) screenShake=Math.min(.5,(impact-8)/20)*.4;
    spawnLandingParticles(avatar.position.clone(),impact);
  }

  // ─── Update landing particles ───
  for(let i=landingParticles.length-1;i>=0;i--){
    const p=landingParticles[i];
    p.userData.life+=dt;
    const t=p.userData.life/p.userData.maxLife;
    p.material.opacity=1-t;
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt;
    p.userData.vy-=8*dt;
    p.rotation.z+=dt*3;
    if(t>=1){scene.remove(p);p.geometry.dispose();p.material.dispose();landingParticles.splice(i,1);}
  }

  // ─── Death zone ───
  if(avatar.position.y<-18) die();

  // ─── Checkpoints ───
  checkpointRings.forEach(r=>{
    const id=r.userData.cpId;
    if(id>cpReached&&r.position.distanceTo(avatar.position)<6){
      cpReached=id; lastCP=id;
      showCpBanner(id);
      hudCp.textContent=`${cpReached}/${TOTAL_CPS}`;
      progBar.style.width=`${(cpReached/(TOTAL_CPS+1))*100}%`;
    }
    r.rotation.z+=dt*1.6;
  });

  // ─── Coins ───
  coinObjects.forEach((c,i)=>{
    if(c.isStar){c.mesh.rotation.y+=dt*2.2;c.mesh.position.y+=Math.sin(Date.now()*.002+c.mesh.userData.fi)*.003;return;}
    if(c.mesh.userData.collected) return;
    c.mesh.rotation.y+=dt*2.8;
    if(c.mesh.position.distanceTo(avatar.position)<1.9){
      c.mesh.userData.collected=true;
      scene.remove(c.mesh);
      gameCoins++;
      hudCoins.textContent=gameCoins;
      showCoinToast('+1 🪙');
    }
  });

  // ─── Limb animation ───
  animT+=dt*(moving?7.5:2.5);
  if(moving&&onGround){
    const s=Math.sin(animT)*.68;
    lLegG.rotation.x= s; rLegG.rotation.x=-s;
    lArmG.rotation.x=-s*.72; rArmG.rotation.x=s*.72;
  }else if(!onGround){
    lArmG.rotation.x=-0.72; rArmG.rotation.x=-0.72;
    const t=Math.min(1,vel.y<0?-vel.y/22:0);
    lLegG.rotation.x=.25+t*.35; rLegG.rotation.x=.25+t*.35;
  }else{
    lLegG.rotation.x*=.84; rLegG.rotation.x*=.84;
    lArmG.rotation.x=Math.sin(animT*.5)*.08;
    rArmG.rotation.x=Math.sin(animT*.5+Math.PI)*.08;
  }

  // ─── Camera follow ───
  const cx=avatar.position.x+camDist*Math.sin(camTheta)*Math.cos(camPhi);
  const cy=avatar.position.y+camDist*Math.sin(camPhi)+4;
  const cz=avatar.position.z+camDist*Math.cos(camTheta)*Math.cos(camPhi);
  camera.position.lerp(new THREE.Vector3(cx,cy,cz),.1);
  if(screenShake>0){
    screenShake=Math.max(0,screenShake-dt*5);
    camera.position.x+=(Math.random()-.5)*screenShake;
    camera.position.y+=(Math.random()-.5)*screenShake;
    camera.position.z+=(Math.random()-.5)*screenShake*.5;
  }
  camera.lookAt(avatar.position.x, avatar.position.y+2.2, avatar.position.z);

  // ─── Clouds drift ───
  clouds.forEach(c=>{c.position.x-=dt*1.8;if(c.position.x<-100)c.position.x=450;});

  // ─── Lava light flicker ───
  lavaGlow.position.x=avatar.position.x;
  lavaGlow.position.z=avatar.position.z;
  lavaGlow.intensity=1.5+Math.sin(Date.now()*.004)*.5;

  hudTime.textContent=fmt(gameTime);
}

function togglePause(){
  gamePaused = !gamePaused;
  document.getElementById('pause-scr').style.display = gamePaused ? 'flex' : 'none';
  document.getElementById('pfab').textContent = gamePaused ? '▶' : '⏸';
}
function showCoinToast(msg){
  const el = document.createElement('div');
  el.className = 'ct3d';
  el.style.color = '#FFD700';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}
function showBoostEffect(){
  const fl = document.getElementById('boost-flash');
  fl.style.display = 'block';
  fl.style.animation = 'none'; void fl.offsetWidth;
  fl.style.animation = 'boostFlash .7s ease-out forwards';
  setTimeout(() => fl.style.display = 'none', 750);
  const el = document.createElement('div');
  el.className = 'ct3d';
  el.style.color = '#FFD700'; el.style.fontSize = '1.25rem';
  el.textContent = '⚡ Speed Boost!';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}
function spawnLandingParticles(pos, force) {
  const count = Math.min(14, 4 + Math.floor(force / 3));
  for (let i = 0; i < count; i++) {
    const size = 0.12 + Math.random() * 0.22;
    const geo = new THREE.PlaneGeometry(size, size);
    const mat = new THREE.MeshBasicMaterial({ color: 0xCCCCCC, transparent: true, opacity: 0.85, side: THREE.DoubleSide, depthWrite: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.position.y += 0.08;
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.8 + Math.random() * 2.4;
    mesh.userData.vx = Math.cos(angle) * spd;
    mesh.userData.vy = 1.2 + Math.random() * 2.2;
    mesh.userData.vz = Math.sin(angle) * spd;
    mesh.userData.life = 0;
    mesh.userData.maxLife = 0.3 + Math.random() * 0.3;
    scene.add(mesh);
    landingParticles.push(mesh);
  }
}

function die(){
  if(isDead) return;
  isDead=true; flashDeath();
  setTimeout(()=>{
    const p=cpPositions[lastCP];
    avatar.position.set(p.x,p.y,p.z);
    vel.set(0,0,0); isDead=false;
  },580);
}
