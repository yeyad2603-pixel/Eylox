<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Eylox — Treasure Hunt 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:'Nunito',sans-serif}
canvas{display:block}

#back-btn{
  position:fixed;top:14px;left:14px;z-index:50;pointer-events:all;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(167,139,250,.5);
  color:#c4b5fd;border-radius:12px;padding:7px 16px;
  cursor:pointer;font-family:'Fredoka One',cursive;font-size:.95rem;
  transition:all .18s;text-decoration:none;display:inline-block
}
#back-btn:hover{background:rgba(124,58,237,.7);color:#fff}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;font-family:'Fredoka One',cursive}
.pill{
  background:rgba(0,0,0,.58);backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.18);border-radius:16px;
  padding:7px 18px;color:#fff;display:flex;align-items:center;gap:8px;
  font-size:1rem;white-space:nowrap
}
.pill .val{font-size:1.3rem;color:#FFD700}
#hud-top{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:center;
  padding:14px 16px;gap:12px
}
#hud-right{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end}

/* Dig prompt */
#dig-prompt{
  position:fixed;bottom:28%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);backdrop-filter:blur(12px);
  border:2px solid #FFD700;border-radius:16px;
  color:#FFD700;font-family:'Fredoka One',cursive;font-size:1.4rem;
  padding:12px 32px;display:none;z-index:20;pointer-events:none;
  animation:digPulse 1s ease-in-out infinite alternate
}
@keyframes digPulse{0%{box-shadow:0 0 10px rgba(255,215,0,.3)}100%{box-shadow:0 0 25px rgba(255,215,0,.8)}}

/* Find banner */
#find-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);
  background:linear-gradient(135deg,#D4AF37,#FFD700);
  color:#fff;border-radius:22px;padding:16px 44px;
  font-size:2rem;font-family:'Fredoka One',cursive;
  display:none;z-index:200;box-shadow:0 0 60px rgba(255,215,0,.8);
  pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.4)
}
#find-banner.show{display:block;animation:findPop .6s ease forwards}
@keyframes findPop{
  0%  {transform:translate(-50%,-50%) scale(.5);opacity:0}
  60% {transform:translate(-50%,-50%) scale(1.1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Time warning */
.time-warn{color:#FF4444!important;animation:timePulse .5s ease-in-out infinite alternate}
@keyframes timePulse{0%{opacity:1}100%{opacity:.5}}

/* End screens */
.end-screen{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:400;color:#fff;font-family:'Fredoka One',cursive;
  backdrop-filter:blur(12px)
}
.end-screen h1{font-size:clamp(2.4rem,8vw,4.5rem);margin-bottom:14px}
.end-stat{font-size:1.4rem;margin:5px 0;color:#d8b4fe}
.end-stat span{color:#fff}
#end-btns{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.ebtn{
  padding:13px 38px;border:none;border-radius:16px;
  font-size:1.15rem;font-family:'Fredoka One',cursive;
  cursor:pointer;transition:transform .18s;pointer-events:all
}
.ebtn.p{background:linear-gradient(135deg,#D4AF37,#FFD700);color:#1a1000;box-shadow:0 4px 24px rgba(255,215,0,.4)}
.ebtn.s{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#d8b4fe}
.ebtn:hover{transform:scale(1.06)}

/* Progress bar */
#prog-wrap{position:fixed;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,.12);z-index:20;pointer-events:none}
#prog-bar{height:100%;width:0;transition:width .6s ease;background:linear-gradient(90deg,#D4AF37,#FFD700)}

/* Mobile */
#mob-ctrl{
  position:fixed;bottom:18px;left:0;right:0;
  display:none;justify-content:space-between;align-items:flex-end;
  padding:0 18px;z-index:20;pointer-events:none
}
@media(pointer:coarse){#mob-ctrl{display:flex}}
#joy-zone{width:120px;height:120px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);border-radius:50%;position:relative;pointer-events:all;flex-shrink:0}
#joy-knob{width:48px;height:48px;background:rgba(255,255,255,.45);border:2px solid rgba(255,255,255,.75);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#dig-btn-mob{
  width:82px;height:82px;background:rgba(255,215,0,.65);border:3px solid #FFD700;
  border-radius:50%;color:#fff;font-family:'Fredoka One',cursive;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent
}
#dig-btn-mob:active{transform:scale(.92)}

#ctrl-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:.65rem;font-weight:700;pointer-events:none;white-space:nowrap;z-index:5}
@media(pointer:coarse){#ctrl-hint{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="games.html">← Games</a>

<div id="hud">
  <div id="hud-top">
    <div class="pill">💎 Found&nbsp;<span class="val" id="hud-found">0/8</span></div>
    <div class="pill" id="timer-pill">⏳&nbsp;<span class="val" id="hud-time">3:00</span></div>
  </div>
  <div id="hud-right">
    <div class="pill">🪙&nbsp;<span class="val" id="hud-coins">0</span></div>
  </div>
</div>

<div id="dig-prompt">⛏ Press E to Dig!</div>

<div id="find-banner">💎 Treasure Found! +50 🪙</div>

<div class="end-screen" id="win-screen">
  <h1 style="color:#FFD700;text-shadow:0 0 40px #FFD700">🎉 Island Cleared!</h1>
  <p class="end-stat">Time Left: <span id="w-time">—</span></p>
  <p class="end-stat">Coins Earned: <span id="w-coins">—</span> 🪙</p>
  <div id="end-btns">
    <button class="ebtn p" onclick="location.reload()">🔄 Play Again</button>
    <button class="ebtn s" onclick="location.href='games.html'">← Games</button>
  </div>
</div>

<div class="end-screen" id="lose-screen">
  <h1 style="color:#FF6B6B;text-shadow:0 0 40px #FF6B6B">⏰ Time's Up!</h1>
  <p class="end-stat">Treasures Found: <span id="l-found">—</span></p>
  <p class="end-stat">Coins: <span id="l-coins">—</span> 🪙</p>
  <div id="end-btns">
    <button class="ebtn p" onclick="location.reload()">🔄 Try Again</button>
    <button class="ebtn s" onclick="location.href='games.html'">← Games</button>
  </div>
</div>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<div id="mob-ctrl">
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="dig-btn-mob">⛏ DIG</div>
</div>

<div id="ctrl-hint">WASD — Move &nbsp;|&nbsp; Mouse — Camera &nbsp;|&nbsp; E — Dig near spots</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════════════
// RENDERER + SCENE
// ════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6BB8D4);
scene.fog = new THREE.Fog(0x6BB8D4, 60, 180);

const camera = new THREE.PerspectiveCamera(68, 1, 0.1, 400);
camera.position.set(0, 12, 16);

function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
window.addEventListener('resize', onResize); onResize();

// ─── Lights ───
const sun = new THREE.DirectionalLight(0xFFF5CC, 2.8);
sun.position.set(40, 80, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=300;
sun.shadow.camera.left=sun.shadow.camera.bottom=-100;
sun.shadow.camera.right=sun.shadow.camera.top=100;
sun.shadow.bias=-0.001;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x80B4D0, 1.1));
scene.add(new THREE.HemisphereLight(0x6BB8D4, 0x4A7C3F, 0.7));

// ─── Clouds ───
const clouds=[];
function mkCloud(x,y,z){
  const g=new THREE.Group();
  const m=new THREE.MeshLambertMaterial({color:0xFFFFFF,transparent:true,opacity:.85});
  [[0,0,0,5,2.5,4],[3.5,.5,0,4,2,3.5],[-3.5,.4,0,3.5,2,3]].forEach(([cx,cy,cz,w,h,d])=>{
    const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);me.position.set(cx,cy,cz);g.add(me);});
  g.position.set(x,y,z); scene.add(g); clouds.push(g);
}
for(let i=0;i<10;i++) mkCloud(Math.random()*200-50,22+Math.random()*15,Math.random()*60-30);

// ════════════════════════════════════════════════════
// ISLAND WORLD
// ════════════════════════════════════════════════════
// Ground — island
const ground = new THREE.Mesh(
  new THREE.CylinderGeometry(30, 32, 1.5, 32),
  new THREE.MeshLambertMaterial({ color:0x5A8A3A })
);
ground.position.y=-0.75;
ground.receiveShadow=true;
scene.add(ground);

// Sand ring at shore
const sand = new THREE.Mesh(
  new THREE.CylinderGeometry(30, 31, 0.5, 32),
  new THREE.MeshLambertMaterial({ color:0xE8D08A })
);
sand.position.y=-1.0;
scene.add(sand);

// Ocean
const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({ color:0x2B6CB0, roughness:.15, metalness:.3, transparent:true, opacity:.88 })
);
ocean.rotation.x=-Math.PI/2;
ocean.position.y=-1.5;
scene.add(ocean);

// Deep water glow
const oceanLight = new THREE.PointLight(0x1A90D0, 1.2, 60);
oceanLight.position.set(0,-3,0);
scene.add(oceanLight);

// Ground collider box for raycasting
const groundBox = new THREE.Mesh(
  new THREE.BoxGeometry(100,1,100),
  new THREE.MeshLambertMaterial({visible:false})
);
groundBox.position.y=0;
scene.add(groundBox);
const collidables=[groundBox];

// ─── Trees ───
function mkTree(x,z){
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.35,.45,2.2,8),new THREE.MeshLambertMaterial({color:0x6B4226}));
  trunk.position.set(x,1.1,z); trunk.castShadow=true; scene.add(trunk);
  const leaves=new THREE.Mesh(new THREE.SphereGeometry(1.8,10,8),new THREE.MeshLambertMaterial({color:0x3A8A1E}));
  leaves.position.set(x,3.2,z); leaves.castShadow=true; scene.add(leaves);
  const leaves2=new THREE.Mesh(new THREE.SphereGeometry(1.3,8,6),new THREE.MeshLambertMaterial({color:0x4CAF50}));
  leaves2.position.set(x+.4,4.2,z-.3); leaves2.castShadow=true; scene.add(leaves2);
}
const treeSpots=[[-18,-12],[-8,-22],[14,-16],[22,8],[-22,10],[10,20],[-14,18],[20,-4],[5,-24],[-24,-2],[15,12],[-6,24]];
treeSpots.forEach(([x,z])=>mkTree(x,z));

// ─── Rocks ───
function mkRock(x,z,s=1){
  const r=new THREE.Mesh(new THREE.BoxGeometry(s*1.4,s*.9,s*1.2),new THREE.MeshLambertMaterial({color:0x888880}));
  r.rotation.y=Math.random()*Math.PI;
  r.position.set(x,.4,z); r.castShadow=r.receiveShadow=true; scene.add(r);
}
[[12,8,.9],[-5,15,.7],[8,-10,1.1],[-16,5,.8],[18,-12,.7],[-10,-18,.9],[0,22,.8],[20,16,.7]].forEach(([x,z,s])=>mkRock(x,z,s));

// ─── Flowers ───
function mkFlower(x,z,col){
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.5,4),new THREE.MeshLambertMaterial({color:0x3A7A1A}));
  stem.position.set(x,.25,z); scene.add(stem);
  const bloom=new THREE.Mesh(new THREE.SphereGeometry(.25,8,6),new THREE.MeshLambertMaterial({color:col}));
  bloom.position.set(x,.6,z); scene.add(bloom);
}
for(let i=0;i<20;i++) mkFlower((Math.random()-.5)*40,(Math.random()-.5)*40,[0xFF6B6B,0xFFD700,0xFF88AA,0xAA88FF][Math.floor(Math.random()*4)]);

// ─── Map landmark (old ruins / palm) ───
const palmTrunk=new THREE.Mesh(new THREE.CylinderGeometry(.25,.35,5,8),new THREE.MeshLambertMaterial({color:0x8B6914}));
palmTrunk.position.set(0,2.5,0); palmTrunk.castShadow=true; scene.add(palmTrunk);
const palmLeaf=new THREE.Mesh(new THREE.SphereGeometry(2.5,8,6),new THREE.MeshLambertMaterial({color:0x2E8B57}));
palmLeaf.position.set(0,5.5,0); palmLeaf.castShadow=true; scene.add(palmLeaf);
// Flag on palm
const flag=new THREE.Mesh(new THREE.BoxGeometry(.9,.6,.05),new THREE.MeshLambertMaterial({color:0xFF2222}));
flag.position.set(0.9,7,0); scene.add(flag);

// ════════════════════════════════════════════════════
// TREASURE SPOTS
// ════════════════════════════════════════════════════
const SPOT_COORDS = [
  { x:12,  z:5  }, { x:-10, z:13 }, { x:-17, z:-3 }, { x:6,   z:-20 },
  { x:20,  z:-9 }, { x:-13, z:17 }, { x:17,  z:14 }, { x:-20, z:-13 }
];
const TOTAL = SPOT_COORDS.length;

const spots = SPOT_COORDS.map((s,i) => {
  const group = new THREE.Group();
  group.position.set(s.x, 0, s.z);
  scene.add(group);

  // X mark on ground
  const xMat = new THREE.MeshStandardMaterial({ color:0xFF6600, emissive:0xFF4400, emissiveIntensity:1.2 });
  const xA = new THREE.Mesh(new THREE.BoxGeometry(1.4,.12,.3), xMat);
  xA.rotation.y = Math.PI/4; xA.position.y=.06; group.add(xA);
  const xB = new THREE.Mesh(new THREE.BoxGeometry(1.4,.12,.3), xMat);
  xB.rotation.y = -Math.PI/4; xB.position.y=.06; group.add(xB);

  // Glow beam
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(.05,.4,4,8,1,true),
    new THREE.MeshStandardMaterial({ color:0xFFDD00, emissive:0xFFDD00, emissiveIntensity:1, transparent:true, opacity:.4, side:THREE.DoubleSide })
  );
  beam.position.y=2; group.add(beam);

  const pl = new THREE.PointLight(0xFFAA00, 1.0, 6);
  pl.position.y=1; group.add(pl);

  return { ...s, group, beam, pl, found:false, idx:i };
});

// ════════════════════════════════════════════════════
// CHEST (created on dig)
// ════════════════════════════════════════════════════
function spawnChest(x,z){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.2,.8,1),new THREE.MeshStandardMaterial({color:0x8B4513,roughness:.8}));
  body.position.y=.4; body.castShadow=true; g.add(body);
  const lid=new THREE.Mesh(new THREE.BoxGeometry(1.2,.4,1),new THREE.MeshStandardMaterial({color:0xA0522D,roughness:.8}));
  lid.position.y=.95; g.add(lid);
  const latch=new THREE.Mesh(new THREE.BoxGeometry(.15,.2,.05),new THREE.MeshStandardMaterial({color:0xFFD700,metalness:.9,roughness:.2}));
  latch.position.set(0,.9,.51); g.add(latch);
  const glow=new THREE.Mesh(new THREE.BoxGeometry(1.3,.1,1.1),new THREE.MeshStandardMaterial({color:0xFFD700,emissive:0xFFD700,emissiveIntensity:2}));
  glow.position.y=.02; g.add(glow);
  g.position.set(x,0,z);
  scene.add(g);
  // Lid open animation
  let lidT=0;
  const openLid=()=>{
    lidT+=.05;
    lid.rotation.x=-Math.min(1.2,lidT*1.5);
    lid.position.y=.95+Math.sin(Math.min(1.2,lidT*1.5))*.4;
    if(lidT<1) requestAnimationFrame(openLid);
  };
  requestAnimationFrame(openLid);
}

// ════════════════════════════════════════════════════
// BLOCKY AVATAR
// ════════════════════════════════════════════════════
let bodyCol=0x4ECDC4,legCol=0x2C3E50,hatCol=0xFF6B6B;
try{const eq=JSON.parse(localStorage.getItem('eylox_equipped')||'{}');if(eq.bodyColor)bodyCol=eq.bodyColor;if(eq.legColor)legCol=eq.legColor;if(eq.hatColor)hatCol=eq.hatColor;}catch{}

const avatar=new THREE.Group(); scene.add(avatar); avatar.position.set(0,0,4);
const mBod=new THREE.MeshLambertMaterial({color:bodyCol});
const mLeg=new THREE.MeshLambertMaterial({color:legCol});
const mFac=new THREE.MeshLambertMaterial({color:0xFFDDAA});
const mHat=new THREE.MeshLambertMaterial({color:hatCol});
const mEye=new THREE.MeshLambertMaterial({color:0x1a1a2e});

function bx(w,h,d,mat,px,py,pz,par){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(px,py,pz);m.castShadow=true;par.add(m);return m;}
bx(1.0,1.2,.6,mBod,0,1.8,0,avatar);
bx(.9,.9,.9,mFac,0,2.85,0,avatar);
bx(1.05,.28,1.05,mHat,0,3.38,0,avatar);
bx(.75,.44,.75,mHat,0,3.65,0,avatar);
bx(.18,.18,.05,mEye,-0.22,2.88,.44,avatar);
bx(.18,.18,.05,mEye, 0.22,2.88,.44,avatar);
bx(.36,.1,.05,mEye,0,2.62,.44,avatar);
const lArmG=new THREE.Group();lArmG.position.set(-.75,2.25,0);avatar.add(lArmG);bx(.42,1.1,.42,mBod,0,-.55,0,lArmG);
const rArmG=new THREE.Group();rArmG.position.set(.75,2.25,0);avatar.add(rArmG);bx(.42,1.1,.42,mBod,0,-.55,0,rArmG);
const lLegG=new THREE.Group();lLegG.position.set(-.28,1.15,0);avatar.add(lLegG);bx(.44,1.1,.44,mLeg,0,-.55,0,lLegG);
const rLegG=new THREE.Group();rLegG.position.set(.28,1.15,0);avatar.add(rLegG);bx(.44,1.1,.44,mLeg,0,-.55,0,rLegG);

// ─── Shovel in hand ───
const shovelHandle=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,1.2,6),new THREE.MeshLambertMaterial({color:0x8B4513}));
shovelHandle.position.set(.25,-.2,.1); shovelHandle.rotation.z=-.3; rArmG.add(shovelHandle);
const shovelHead=new THREE.Mesh(new THREE.BoxGeometry(.4,.3,.08),new THREE.MeshLambertMaterial({color:0x888888}));
shovelHead.position.set(.48,-.8,.1); rArmG.add(shovelHead);

// ════════════════════════════════════════════════════
// PHYSICS
// ════════════════════════════════════════════════════
const vel=new THREE.Vector3();
const GRAVITY=-22, SPEED=7, FRICTION=.76;
let onGround=false, isDead=false;
let gameEnded=false;

const downRay=new THREE.Raycaster();
downRay.ray.direction.set(0,-1,0);

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
const TOTAL_TIME=180; // 3 minutes
let timeLeft=TOTAL_TIME, foundCount=0, gameCoins=0;

// ════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════
const keys=new Set();
window.addEventListener('keydown',e=>keys.add(e.code));
window.addEventListener('keyup',  e=>keys.delete(e.code));

// Dig on E
window.addEventListener('keydown',e=>{
  if(e.code==='KeyE') tryDig();
});

let camTheta=Math.PI,camPhi=.35,camDist=12;
let dragging=false,prevMX=0,prevMY=0;
canvas.addEventListener('mousedown',e=>{dragging=true;prevMX=e.clientX;prevMY=e.clientY;});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{if(!dragging)return;camTheta-=(e.clientX-prevMX)*.005;camPhi=Math.max(.05,Math.min(1.2,camPhi+(e.clientY-prevMY)*.005));prevMX=e.clientX;prevMY=e.clientY;});
window.addEventListener('wheel',e=>{camDist=Math.max(6,Math.min(22,camDist+e.deltaY*.02));},{passive:true});
const camT={};
canvas.addEventListener('touchstart',e=>{[...e.changedTouches].forEach(t=>{camT[t.identifier]={x:t.clientX,y:t.clientY}})},{passive:true});
canvas.addEventListener('touchmove', e=>{[...e.changedTouches].forEach(t=>{const p=camT[t.identifier];if(!p)return;camTheta-=(t.clientX-p.x)*.005;camPhi=Math.max(.05,Math.min(1.2,camPhi+(t.clientY-p.y)*.005));camT[t.identifier]={x:t.clientX,y:t.clientY}})},{passive:true});
canvas.addEventListener('touchend', e=>{[...e.changedTouches].forEach(t=>delete camT[t.identifier])},{passive:true});

// Joystick
let joyX=0,joyY=0,joyTId=-1;
const joyZone=document.getElementById('joy-zone'),joyKnob=document.getElementById('joy-knob');
const digBtnMob=document.getElementById('dig-btn-mob');
const JR=42;
function setJoy(dx,dy){const len=Math.min(JR,Math.sqrt(dx*dx+dy*dy)),a=Math.atan2(dy,dx);joyX=Math.cos(a)*len/JR;joyY=Math.sin(a)*len/JR;joyKnob.style.transform=`translate(calc(-50% + ${Math.cos(a)*len}px),calc(-50% + ${Math.sin(a)*len}px))`;}
joyZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyTId=t.identifier;const r=joyZone.getBoundingClientRect();setJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2))},{passive:false});
joyZone.addEventListener('touchmove', e=>{e.preventDefault();const t=[...e.changedTouches].find(t=>t.identifier===joyTId);if(!t)return;const r=joyZone.getBoundingClientRect();setJoy(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2))},{passive:false});
const resetJoy=()=>{joyX=0;joyY=0;joyKnob.style.transform='translate(-50%,-50%)'};
joyZone.addEventListener('touchend',resetJoy);joyZone.addEventListener('touchcancel',resetJoy);
digBtnMob.addEventListener('touchstart',e=>{e.preventDefault();tryDig();},{passive:false});

// ════════════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════════════
const hudFound=document.getElementById('hud-found');
const hudTime=document.getElementById('hud-time');
const hudCoins=document.getElementById('hud-coins');
const progBar=document.getElementById('prog-bar');
const timerPill=document.getElementById('timer-pill');
const digPrompt=document.getElementById('dig-prompt');

function fmt(s){const m=Math.floor(s/60);return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

let bannerT=0;
function showFindBanner(){
  const el=document.getElementById('find-banner');
  el.className='';void el.offsetWidth;el.className='show';
  bannerT=2.2;
}

function triggerDig(){
  // Shovel swing animation
  let t=0;
  const swing=()=>{t+=.12;rArmG.rotation.x=-Math.sin(t*Math.PI)*1.5;if(t<1)requestAnimationFrame(swing);else rArmG.rotation.x=0;};
  requestAnimationFrame(swing);
}

let nearSpotIdx=-1;
function tryDig(){
  if(gameEnded) return;
  if(nearSpotIdx<0) return;
  const sp=spots[nearSpotIdx];
  if(sp.found) return;
  sp.found=true;
  scene.remove(sp.group);
  spawnChest(sp.x,sp.z);
  triggerDig();
  foundCount++;
  gameCoins+=50;
  hudFound.textContent=`${foundCount}/${TOTAL}`;
  hudCoins.textContent=gameCoins;
  progBar.style.width=`${(foundCount/TOTAL)*100}%`;
  showFindBanner();
  if(foundCount>=TOTAL) setTimeout(showWin,800);
}

function showWin(){
  gameEnded=true;
  document.getElementById('w-time').textContent=fmt(timeLeft);
  document.getElementById('w-coins').textContent=gameCoins;
  document.getElementById('win-screen').style.display='flex';
  try{const u=JSON.parse(localStorage.getItem('eylox_user')||'{}');if(u.username)localStorage.setItem('eylox_hs_treasure3d',gameCoins);}catch{}
}

function showLose(){
  gameEnded=true;
  document.getElementById('l-found').textContent=`${foundCount}/${TOTAL}`;
  document.getElementById('l-coins').textContent=gameCoins;
  document.getElementById('lose-screen').style.display='flex';
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
const clock=new THREE.Clock();
let animT=0;

(function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  if(!gameEnded) update(dt);
  renderer.render(scene,camera);
})();

function update(dt){
  // Timer
  timeLeft=Math.max(0,timeLeft-dt);
  hudTime.textContent=fmt(timeLeft);
  if(timeLeft<30) timerPill.className='pill time-warn'; else timerPill.className='pill';
  if(timeLeft<=0 && foundCount<TOTAL){ showLose(); return; }

  // Find banner countdown
  if(bannerT>0){bannerT-=dt;if(bannerT<=0)document.getElementById('find-banner').className='';}

  // ─── Movement ───
  const mx=(keys.has('KeyD')||keys.has('ArrowRight')?1:0)-(keys.has('KeyA')||keys.has('ArrowLeft')?1:0)+joyX;
  const mz=(keys.has('KeyS')||keys.has('ArrowDown') ?1:0)-(keys.has('KeyW')||keys.has('ArrowUp')  ?1:0)+joyY;

  const camF=new THREE.Vector3(-Math.sin(camTheta),0,-Math.cos(camTheta));
  const camR=new THREE.Vector3( Math.cos(camTheta),0,-Math.sin(camTheta));
  const wish=camR.clone().multiplyScalar(mx).add(camF.clone().multiplyScalar(-mz));
  wish.y=0;

  const moving=wish.lengthSq()>.001;
  if(moving){
    wish.normalize();
    vel.x=wish.x*SPEED; vel.z=wish.z*SPEED;
    const ta=Math.atan2(wish.x,wish.z);
    let diff=ta-avatar.rotation.y;
    while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
    avatar.rotation.y+=diff*.2;
  }else{vel.x*=FRICTION;vel.z*=FRICTION;}

  // Boundary: keep on island
  const nextX=avatar.position.x+vel.x*dt;
  const nextZ=avatar.position.z+vel.z*dt;
  const dist=Math.sqrt(nextX*nextX+nextZ*nextZ);
  if(dist>27){const a=Math.atan2(nextZ,nextX);avatar.position.x=Math.cos(a)*27;avatar.position.z=Math.sin(a)*27;vel.x*=-.4;vel.z*=-.4;}

  // Gravity + integrate
  vel.y+=GRAVITY*dt;
  avatar.position.addScaledVector(vel,dt);

  // Ground check
  downRay.set(new THREE.Vector3(avatar.position.x,avatar.position.y+.5,avatar.position.z),new THREE.Vector3(0,-1,0));
  const hits=downRay.intersectObjects(collidables,false);
  if(hits.length>0&&hits[0].distance<.8){
    onGround=true;
    avatar.position.y=hits[0].point.y;
    vel.y=0;
  }else{
    onGround=false;
  }

  // ─── Spot proximity ───
  nearSpotIdx=-1;
  let nearDist=Infinity;
  spots.forEach((sp,i)=>{
    if(sp.found) return;
    const dx=avatar.position.x-sp.x, dz=avatar.position.z-sp.z;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d<2.8&&d<nearDist){nearDist=d;nearSpotIdx=i;}
    // Animate beam + light flicker
    sp.beam.rotation.y+=dt*1.5;
    sp.pl.intensity=.8+Math.sin(Date.now()*.003+sp.idx)*.4;
  });
  digPrompt.style.display=nearSpotIdx>=0?'block':'none';

  // ─── Limb animation ───
  animT+=dt*(moving?7:2);
  if(moving&&onGround){
    const s=Math.sin(animT)*.65;
    lLegG.rotation.x=s; rLegG.rotation.x=-s;
    lArmG.rotation.x=-s*.5;
  }else{
    lLegG.rotation.x*=.85; rLegG.rotation.x*=.85;
    lArmG.rotation.x=Math.sin(animT*.5)*.07;
  }

  // ─── Camera ───
  const cx=avatar.position.x+camDist*Math.sin(camTheta)*Math.cos(camPhi);
  const cy=avatar.position.y+camDist*Math.sin(camPhi)+3.5;
  const cz=avatar.position.z+camDist*Math.cos(camTheta)*Math.cos(camPhi);
  camera.position.lerp(new THREE.Vector3(cx,cy,cz),.1);
  camera.lookAt(avatar.position.x,avatar.position.y+2.2,avatar.position.z);

  // ─── Clouds drift ───
  clouds.forEach(c=>{c.position.x-=dt*1.5;if(c.position.x<-80)c.position.x=200;});

  // ─── Ocean shimmer ───
  oceanLight.intensity=1+Math.sin(Date.now()*.001)*.3;
}
</script>
</body>
</html>
