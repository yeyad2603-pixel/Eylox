<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Eylox — City Roleplay 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000000;overflow:hidden;font-family:'Nunito',sans-serif}
canvas{display:block}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;font-family:'Fredoka One',cursive}
.pill{
  background:rgba(0,0,0,.58);backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.18);border-radius:16px;
  padding:7px 18px;color:#fff;display:flex;align-items:center;gap:8px;
  font-size:1rem;white-space:nowrap
}
.pill .val{font-size:1.3rem;color:#FFD700}
#hud-top{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:center;
  padding:14px 16px;gap:12px;flex-wrap:wrap;
}
#back-btn{
  position:fixed;top:14px;left:14px;z-index:50;pointer-events:all;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(74,222,128,.5);
  color:#4ade80;border-radius:12px;padding:7px 16px;
  cursor:pointer;font-family:'Fredoka One',cursive;font-size:.95rem;
  transition:all .18s;text-decoration:none;display:inline-block
}
#back-btn:hover{background:rgba(0,120,60,.7);color:#fff}

#speed-bar-wrap{
  position:fixed;bottom:60px;right:18px;
  width:110px;z-index:20;pointer-events:none;text-align:center;
}
#speed-label{font-family:'Fredoka One',cursive;font-size:.75rem;color:rgba(255,255,255,.6);margin-bottom:4px}
#speed-num{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4ade80}
#speed-unit{font-family:'Fredoka One',cursive;font-size:.7rem;color:rgba(255,255,255,.4)}

#msg-banner{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:linear-gradient(135deg,#065f46,#059669);
  color:#fff;border-radius:22px;padding:16px 40px;
  font-size:1.6rem;font-family:'Fredoka One',cursive;
  display:none;z-index:200;box-shadow:0 0 60px rgba(5,150,105,.8);
  pointer-events:none;white-space:nowrap;
}
#msg-banner.show{display:block;animation:msgPop .5s ease forwards}
@keyframes msgPop{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.06);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

#minimap{
  position:fixed;bottom:18px;right:18px;z-index:20;
  width:130px;height:130px;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(74,222,128,.35);
  border-radius:12px;overflow:hidden;pointer-events:none;
}
#minimap canvas{width:100%;height:100%}

#end-screen{
  position:fixed;inset:0;background:rgba(0,0,0,.9);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:400;color:#fff;font-family:'Fredoka One',cursive;
  backdrop-filter:blur(14px)
}
#end-screen h1{font-size:clamp(2rem,7vw,3.5rem);color:#FFD700;text-shadow:0 0 40px #FFD700;margin-bottom:12px}
.end-stat{font-size:1.2rem;margin:4px 0;color:#86efac}
.end-stat span{color:#fff}
#end-btns{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.ebtn{
  padding:12px 34px;border:none;border-radius:14px;
  font-size:1.1rem;font-family:'Fredoka One',cursive;
  cursor:pointer;transition:transform .18s;pointer-events:all
}
.ebtn.p{background:linear-gradient(135deg,#065f46,#059669);color:#fff;box-shadow:0 4px 24px rgba(5,150,105,.5)}
.ebtn.s{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#86efac}
.ebtn:hover{transform:scale(1.06)}

#mob-ctrl{
  position:fixed;bottom:18px;left:0;right:0;
  display:none;justify-content:space-between;align-items:flex-end;
  padding:0 160px 0 18px;z-index:20;pointer-events:none
}
@media(pointer:coarse){#mob-ctrl{display:flex}}
#joy-zone{
  width:120px;height:120px;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);
  border-radius:50%;position:relative;pointer-events:all;flex-shrink:0
}
#joy-knob{
  width:48px;height:48px;
  background:rgba(74,222,128,.55);border:2px solid #4ade80;
  border-radius:50%;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none
}

#ctrl-hint{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.35);font-size:.65rem;font-weight:700;
  pointer-events:none;white-space:nowrap;z-index:5
}
@media(pointer:coarse){#ctrl-hint{display:none}}
/* Pause */
#pause-scr{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(10px);font-family:'Fredoka One',cursive;color:#fff}
#pause-scr h2{font-size:2.8rem;color:#4ade80;margin-bottom:6px;text-shadow:0 0 28px rgba(74,222,128,.45)}
#pause-scr p{color:rgba(255,255,255,.5);margin-bottom:24px;font-size:.9rem}
.pscr-btn{padding:13px 44px;border:none;border-radius:16px;font-size:1.15rem;font-family:'Fredoka One',cursive;cursor:pointer;transition:transform .18s;margin:5px;pointer-events:all;display:block;width:230px;text-align:center}
.pscr-btn.res{background:linear-gradient(135deg,#065f46,#059669);color:#fff;box-shadow:0 4px 20px rgba(5,150,105,.4)}
.pscr-btn.qut{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#86efac}
.pscr-btn:hover{transform:scale(1.05)}
#pfab{position:fixed;top:14px;right:130px;z-index:50;pointer-events:all;background:rgba(0,0,0,.65);border:1.5px solid rgba(74,222,128,.35);color:rgba(74,222,128,.85);border-radius:12px;padding:7px 13px;cursor:pointer;font-size:.95rem;font-family:'Fredoka One',cursive;transition:all .18s}
#pfab:hover{background:rgba(0,80,40,.7);color:#4ade80}
/* Coin toast */
@keyframes cfl3d{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-54px)}}
.ct3d{position:fixed;bottom:200px;left:50%;z-index:300;font-family:'Fredoka One',cursive;font-size:1.05rem;pointer-events:none;animation:cfl3d 1.4s ease-out forwards;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.5);color:#FFD700}
/* Speed bonus flash */
@keyframes spdFlash{0%{opacity:.35}100%{opacity:0}}
#spd-flash{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(74,222,128,.3) 0%,transparent 70%);pointer-events:none;z-index:250;display:none}
</style>
<script src="audit-loader.js" defer></script>
  <script src="debug-dashboard.js" defer></script>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="games.html">← Games</a>
<div id="spd-flash"></div>
<button id="pfab" onclick="togglePause()">⏸</button>
<div id="pause-scr">
  <h2>⏸ PAUSED</h2>
  <p>Press P or tap Resume to continue</p>
  <button class="pscr-btn res" onclick="togglePause()">▶ Resume</button>
  <button class="pscr-btn qut" onclick="location.href='games.html'">← Quit to Games</button>
</div>

<div id="hud">
  <div id="hud-top">
    <div class="pill">🚗 Delivered&nbsp;<span class="val" id="hud-fare">0</span></div>
    <div class="pill">⏱&nbsp;<span class="val" id="hud-time">120</span>s</div>
    <div class="pill">🪙&nbsp;<span class="val" id="hud-coins">0</span></div>
    <div class="pill" id="hud-pb-wrap" style="display:none">🏆&nbsp;<span style="font-size:.68rem;color:rgba(255,255,255,.55)">BEST&nbsp;</span><span class="val" id="hud-pb">—</span></div>
    <div class="pill" id="hud-boost-pill" style="display:none;background:rgba(245,158,11,.25);border-color:rgba(245,158,11,.5);color:#fde68a">⚡&nbsp;<span class="val" id="hud-boost-timer">2×</span></div>
  </div>
</div>

<div id="speed-bar-wrap">
  <div id="speed-label">Speed</div>
  <div id="speed-num">0</div>
  <div id="speed-unit">km/h</div>
</div>

<div id="msg-banner">🚖 Fare Delivered!</div>

<div id="minimap"><canvas id="minimap-c" width="130" height="130"></canvas></div>

<div id="end-screen">
  <h1>🏁 Time's Up!</h1>
  <p class="end-stat">Fares Delivered: <span id="e-fare">0</span></p>
  <p class="end-stat">Eylux Earned: <span id="e-coins">0</span> 🪙</p>
  <p class="end-stat" id="e-pb-line" style="display:none">🏆 <span id="e-pb-txt" style="color:#4ade80"></span></p>
  <p class="end-stat" id="e-streak-line" style="display:none">🔥 Streak Bonus: +<span id="e-streak-val">0</span> 🪙</p>
  <div id="end-btns">
    <button class="ebtn p" onclick="location.reload()">🔄 Drive Again</button>
    <button class="ebtn s" id="e-share-btn">📣 Share</button>
    <button class="ebtn s" onclick="location.href='games.html'">← Games</button>
  </div>
</div>

<div id="mob-ctrl">
  <div id="joy-zone"><div id="joy-knob"></div></div>
</div>

<div id="ctrl-hint">WASD / Arrows — Drive &nbsp;|&nbsp; Mouse — Camera</div>

{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}

<script type="module">
import * as THREE from 'three';

// ── Renderer
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xadd8e6, 80, 300);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 600);

function onResize() {
  const w = innerWidth, h = innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
onResize();

// ── Lighting
scene.add(new THREE.AmbientLight(0xfff4e0, 0.8));
const sun = new THREE.DirectionalLight(0xfff8d0, 1.4);
sun.position.set(80, 120, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 400;
sun.shadow.camera.left = sun.shadow.camera.bottom = -160;
sun.shadow.camera.right = sun.shadow.camera.top   =  160;
scene.add(sun);

// ── City grid constants
const CELL  = 20;   // road grid cell size
const GRID  = 10;   // number of cells (10x10 = 200x200 map)
const ROAD  = 6;    // road width per side (12 total in cell)
const MAP_W = CELL * GRID; // 200

// ── Road (ground)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(MAP_W + 40, MAP_W + 40),
  new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Sidewalk / block fill (one giant lighter plane)
const sidewalk = new THREE.Mesh(
  new THREE.PlaneGeometry(MAP_W, MAP_W),
  new THREE.MeshStandardMaterial({ color: 0x888880, roughness: 1 })
);
sidewalk.rotation.x = -Math.PI / 2;
sidewalk.position.y = 0.01;
sidewalk.receiveShadow = true;
scene.add(sidewalk);

// Road lane lines
function addRoadLine(x1, z1, x2, z2) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(len, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xffffaa, roughness: 1 })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set((x1 + x2) / 2, 0.04, (z1 + z2) / 2);
  mesh.rotation.z = Math.atan2(dx, dz);  // wrong, redo below
  // simpler: horizontal vs vertical
  if (Math.abs(dx) > Math.abs(dz)) {
    mesh.position.set((x1 + x2) / 2, 0.04, (z1 + z2) / 2);
    mesh.rotation.set(-Math.PI / 2, 0, 0);
  } else {
    mesh.rotation.set(-Math.PI / 2, 0, Math.PI / 2);
  }
  scene.add(mesh);
}

// ── Buildings
const BUILDINGS = [];
const BUILD_COLORS = [0x1565C0, 0x37474F, 0x4E342E, 0x1B5E20, 0x880E4F, 0x004D40, 0x212121, 0x3E2723];
const WINDOW_COLORS = [0xFFF176, 0x80D8FF, 0xFFCC80, 0xCCFF90, 0xEA80FC];

function makeBuilding(cx, cz) {
  const bw = 8 + Math.random() * 6;
  const bh = 8 + Math.random() * 40;
  const bd = 8 + Math.random() * 6;
  const col = BUILD_COLORS[Math.floor(Math.random() * BUILD_COLORS.length)];
  const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7 });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mat);
  mesh.position.set(cx, bh / 2, cz);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);

  // Windows
  const wc = WINDOW_COLORS[Math.floor(Math.random() * WINDOW_COLORS.length)];
  const wmMat = new THREE.MeshStandardMaterial({ color: wc, emissive: wc, emissiveIntensity: 0.5, roughness: 0.3 });
  const floors = Math.floor(bh / 3);
  for (let f = 0; f < floors; f++) {
    const wy = 2 + f * 3;
    // Front & back windows
    for (const side of [-1, 1]) {
      if (Math.random() > 0.4) {
        const wm = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.6), wmMat);
        wm.position.set(cx + (Math.random() - 0.5) * (bw - 2.5), wy, cz + side * (bd / 2 + 0.05));
        wm.rotation.y = side < 0 ? 0 : Math.PI;
        scene.add(wm);
      }
    }
  }
  BUILDINGS.push({ x: cx, z: cz, hw: bw / 2 + 0.5, hd: bd / 2 + 0.5 });
}

// Place buildings in each grid cell (skip center roads)
for (let row = 0; row < GRID; row++) {
  for (let col = 0; col < GRID; col++) {
    const cx = (col - GRID / 2) * CELL + CELL / 2;
    const cz = (row - GRID / 2) * CELL + CELL / 2;
    // Each block has road borders — building sits in inner area
    const bx = cx + rnd(-CELL / 2 + ROAD + 3, CELL / 2 - ROAD - 2);
    const bz = cz + rnd(-CELL / 2 + ROAD + 3, CELL / 2 - ROAD - 2);
    if (Math.random() > 0.15) makeBuilding(bx, bz);
  }
}

// ── Coins scattered on roads
const COINS = [];
const coinMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.2, metalness: 0.9, emissive: 0x885500, emissiveIntensity: 0.3 });
function spawnCoin(x, z) {
  const mesh = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.2, 8, 16), coinMat);
  mesh.position.set(x, 0.8, z);
  mesh.rotation.x = Math.PI / 2;
  scene.add(mesh);
  COINS.push({ mesh, x, z, r: 2.5, collected: false });
}
// Coins on road intersections
for (let i = 0; i < 40; i++) {
  const col = Math.floor(Math.random() * GRID);
  const row = Math.floor(Math.random() * GRID);
  const rx = (col - GRID / 2) * CELL + rnd(-ROAD, ROAD);
  const rz = (row - GRID / 2) * CELL + rnd(-ROAD, ROAD);
  spawnCoin(rx, rz);
}

// ── Passengers (fare pickups)
const PASSENGERS = [];
const passengerColors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0xf9ca24, 0x6c5ce7, 0xe17055];
const DEST_COLORS = [0xf8a5c2, 0x55efc4, 0x74b9ff, 0xffeaa7, 0xa29bfe, 0xfab1a0];

function makePassenger() {
  const col = passengerColors[Math.floor(Math.random() * passengerColors.length)];
  const destCol = DEST_COLORS[Math.floor(Math.random() * DEST_COLORS.length)];
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.6, 8), new THREE.MeshStandardMaterial({ color: col }));
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 8), new THREE.MeshStandardMaterial({ color: 0xFAD7A0 }));
  head.position.y = 1.3;
  // Waving arm
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({ color: col }));
  arm.position.set(0.6, 0.8, 0);
  arm.rotation.z = -Math.PI / 3;
  g.add(body, head, arm);

  // Destination marker
  const dest = new THREE.Group();
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3, 6), new THREE.MeshStandardMaterial({ color: destCol }));
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.8), new THREE.MeshStandardMaterial({ color: destCol, side: THREE.DoubleSide }));
  flag.position.set(0.6, 1.6, 0);
  dest.add(pole, flag);

  // Pick a road spot
  const pickCol = Math.floor(Math.random() * GRID);
  const pickRow = Math.floor(Math.random() * GRID);
  const px = (pickCol - GRID / 2) * CELL + (Math.random() > 0.5 ? ROAD + 1 : -(ROAD + 1));
  const pz = (pickRow - GRID / 2) * CELL + rnd(-CELL / 2 + 2, CELL / 2 - 2);
  g.position.set(px, 0, pz);
  scene.add(g);

  // Destination
  const dCol = Math.floor(Math.random() * GRID);
  const dRow = Math.floor(Math.random() * GRID);
  const dx = (dCol - GRID / 2) * CELL + rnd(-ROAD, ROAD);
  const dz = (dRow - GRID / 2) * CELL + rnd(-ROAD, ROAD);
  dest.position.set(dx, 0, dz);
  dest.visible = false;
  scene.add(dest);

  return { group: g, dest, px, pz, dx, dz, pickedUp: false, delivered: false, color: col };
}

for (let i = 0; i < 6; i++) PASSENGERS.push(makePassenger());

// ── Player car
function makeCar() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 1.2, 4.8),
    new THREE.MeshStandardMaterial({ color: 0xf59e0b, roughness: 0.4, metalness: 0.3 })
  );
  body.position.y = 0.8;
  body.castShadow = true;
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 0.9, 2.6),
    new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.4, metalness: 0.2 })
  );
  roof.position.set(0, 1.85, 0.3);
  roof.castShadow = true;
  // Wheels
  const wMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  for (const [wx, wz] of [[-1.3, -1.6], [1.3, -1.6], [-1.3, 1.6], [1.3, 1.6]]) {
    const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.4, 12), wMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(wx, 0.5, wz);
    g.add(wheel);
  }
  // Headlights
  const hMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffaa, emissiveIntensity: 1 });
  for (const hx of [-0.8, 0.8]) {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.1), hMat);
    hl.position.set(hx, 0.85, -2.45);
    g.add(hl);
  }
  // Taxi sign
  const taxiSign = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.35, 0.1), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffd700, emissiveIntensity: 2 }));
  taxiSign.position.set(0, 2.4, 0.3);
  g.add(body, roof, taxiSign);
  return g;
}

const carGroup = makeCar();
carGroup.position.set(0, 0, 0);
scene.add(carGroup);

// ── Input
const keys = {};
let joyX = 0, joyY = 0;
window.addEventListener('keydown', e => { keys[e.key] = true; if(e.key==='p'||e.key==='P') togglePause(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

const joyZone  = document.getElementById('joy-zone');
const joyKnob  = document.getElementById('joy-knob');
let joyOrigin  = null;
joyZone.addEventListener('touchstart', e => {
  joyOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
joyZone.addEventListener('touchmove', e => {
  if (!joyOrigin) return;
  const dx = e.touches[0].clientX - joyOrigin.x;
  const dy = e.touches[0].clientY - joyOrigin.y;
  const max = 38;
  joyKnob.style.transform = `translate(calc(-50% + ${Math.max(-max,Math.min(max,dx))}px), calc(-50% + ${Math.max(-max,Math.min(max,dy))}px))`;
  joyX = Math.max(-1, Math.min(1, dx / max));
  joyY = Math.max(-1, Math.min(1, dy / max));
  e.preventDefault();
}, { passive: false });
joyZone.addEventListener('touchend', () => {
  joyOrigin = null; joyX = 0; joyY = 0;
  joyKnob.style.transform = 'translate(-50%,-50%)';
});

// ── Game state
let carAngle = 0, carSpeed = 0;
const MAX_SPEED = 22, ACCEL = 38, BRAKE = 24, FRICTION = 18, TURN_SPD = 2.5;
let coinsTotal = 0, faresDelivered = 0, gameTime = 120, gameOver = false;
let pickedUpPassenger = null, pickupTime = 0;
let msgTimer = 0;
const clock = { prev: performance.now() };
let elapsed = 0;
let gamePaused = false, screenShake = 0;
const _pbKeyC = 'eylox_hs_city3d';
(function(){ try { const b=JSON.parse(localStorage.getItem('eylox_coin_boost')||'null'); if(b&&b.expires>Date.now()){const pill=document.getElementById('hud-boost-pill'),timer=document.getElementById('hud-boost-timer');if(pill)pill.style.display='';function upd(){const r=Math.max(0,b.expires-Date.now());if(timer)timer.textContent='⚡ '+Math.ceil(r/60000)+'m';if(r<=0&&pill)pill.style.display='none';}upd();setInterval(upd,10000);}}catch{} })();
let _pbFaresC = localStorage.getItem(_pbKeyC) ? +localStorage.getItem(_pbKeyC) : null;
(()=>{ try { const _u=JSON.parse(localStorage.getItem('eylox_user')||'null'); const _s=JSON.parse(localStorage.getItem('eylox_game_sessions')||'[]'); _s.push({id:'city-roleplay-3d',user:_u?.username||'Player',title:'City Roleplay 3D',t:Date.now()}); localStorage.setItem('eylox_game_sessions',JSON.stringify(_s.slice(-500))); if(_u){_u.gamesPlayed=(_u.gamesPlayed||0)+1;localStorage.setItem('eylox_user',JSON.stringify(_u));if(_u.username)localStorage.setItem('eylox_userdata_'+_u.username,JSON.stringify(_u));} } catch {} })();

// HUD
const hudFare  = document.getElementById('hud-fare');
const hudTime  = document.getElementById('hud-time');
const hudCoins = document.getElementById('hud-coins');
const speedNum = document.getElementById('speed-num');
const msgBanner = document.getElementById('msg-banner');
const hudPbWrap = document.getElementById('hud-pb-wrap');
const hudPbEl   = document.getElementById('hud-pb');
if (_pbFaresC !== null) { hudPbWrap.style.display=''; hudPbEl.textContent=_pbFaresC+' fares'; }

function showMsg(text) {
  msgBanner.textContent = text;
  msgBanner.classList.remove('show');
  void msgBanner.offsetWidth;
  msgBanner.classList.add('show');
  msgTimer = 2000;
}

function rnd(a, b) { return a + Math.random() * (b - a); }
function dist2(ax, az, bx, bz) {
  const dx = ax - bx, dz = az - bz;
  return Math.sqrt(dx * dx + dz * dz);
}

function awardCoins(n) {
  coinsTotal += n;
  try {
    const u = JSON.parse(localStorage.getItem('eylox_user') || 'null');
    if (u) { u.coins = Math.min((u.coins || 0) + n, 1e9); localStorage.setItem('eylox_user', JSON.stringify(u)); }
  } catch {}
}

function togglePause() {
  gamePaused = !gamePaused;
  document.getElementById('pause-scr').style.display = gamePaused ? 'flex' : 'none';
  document.getElementById('pfab').textContent = gamePaused ? '▶' : '⏸';
}
function showCoinToast(msg) {
  const el = document.createElement('div');
  el.className = 'ct3d';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}
function showSpeedBonus(n) {
  const fl = document.getElementById('spd-flash');
  fl.style.display = 'block';
  fl.style.animation = 'none'; void fl.offsetWidth;
  fl.style.animation = 'spdFlash .8s ease-out forwards';
  setTimeout(() => fl.style.display = 'none', 850);
  const el = document.createElement('div');
  el.className = 'ct3d';
  el.style.fontSize = '1.25rem'; el.style.color = '#4ade80';
  el.textContent = `⚡ Speed Bonus! +${n} 🪙`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function triggerEnd() {
  if (gameOver) return;
  gameOver = true;

  // Streak bonus
  let bonusCoins = 0;
  try {
    const log = JSON.parse(localStorage.getItem('eylox_login_log') || '[]');
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (log.includes(yesterday)) {
      bonusCoins = Math.round(coinsTotal * 0.25);
      document.getElementById('e-streak-line').style.display = '';
      document.getElementById('e-streak-val').textContent = bonusCoins;
    }
  } catch {}

  const finalCoins = coinsTotal + bonusCoins;
  awardCoins(bonusCoins);
  document.getElementById('e-fare').textContent  = faresDelivered;
  document.getElementById('e-coins').textContent = finalCoins;
  document.getElementById('end-screen').style.display = 'flex';

  // Share button
  document.getElementById('e-share-btn').onclick = () => {
    const txt = `🚖 City Roleplay 3D — delivered ${faresDelivered} fares and earned ${finalCoins} coins! Play on Eylox!`;
    if (navigator.share) navigator.share({ title: 'Eylox City', text: txt }).catch(() => {});
    else navigator.clipboard?.writeText(txt).then(() => showCoinToast('📋 Copied!'));
  };

  try {
    const prev = +(localStorage.getItem(_pbKeyC) || 0);
    const newBest = faresDelivered > prev;
    if (newBest) {
      localStorage.setItem(_pbKeyC, faresDelivered);
      _pbFaresC = faresDelivered;
      hudPbEl.textContent = faresDelivered + ' fares'; hudPbWrap.style.display = '';
      document.getElementById('e-pb-line').style.display = '';
      document.getElementById('e-pb-txt').textContent = 'New Record: ' + faresDelivered + ' fares! 🎉';
    } else if (prev > 0) {
      document.getElementById('e-pb-line').style.display = '';
      document.getElementById('e-pb-txt').textContent = 'Best: ' + prev + ' fares';
    }
    const _cu = JSON.parse(localStorage.getItem('eylox_user')||'{}');
    if(_cu.username){try{const lb=JSON.parse(localStorage.getItem('eylox_lb_entries')||'[]');const prevBest=lb.filter(e=>e.user===_cu.username&&e.gameId==='city-roleplay-3d').reduce((b,e)=>Math.max(b,e.score),0);lb.push({user:_cu.username,avatar:_cu.avatar||'🎮',score:finalCoins,game:'City Roleplay 3D',gameId:'city-roleplay-3d',ts:Date.now()});localStorage.setItem('eylox_lb_entries',JSON.stringify(lb.slice(-300)));if(finalCoins>prevBest){_cu.wins=(_cu.wins||0)+1;localStorage.setItem('eylox_user',JSON.stringify(_cu));localStorage.setItem('eylox_userdata_'+_cu.username,JSON.stringify(_cu));}}catch{}}
    const entry = { id:'city-roleplay-3d', title:'City Roleplay 3D', thumb:'🏙️', genre:'roleplay', playedAt: Date.now() };
    const r = JSON.parse(localStorage.getItem('eylox_recently_played') || '[]');
    r.unshift(entry); localStorage.setItem('eylox_recently_played', JSON.stringify(r.slice(0, 10)));
    localStorage.setItem('eylox_pending_notif', JSON.stringify({ title:'🚖 Taxi Shift Done!', body:`Delivered ${faresDelivered} fares and earned ${finalCoins} Eylux!`, type:'game', ts:Date.now() }));
  } catch {}
}

// ── Minimap
const mmCanvas = document.getElementById('minimap-c');
const mmCtx    = mmCanvas.getContext('2d');
const MM_W     = 130, MM_SCALE = MM_W / MAP_W;

function drawMinimap() {
  mmCtx.fillStyle = '#1a1a2e';
  mmCtx.fillRect(0, 0, MM_W, MM_W);
  // Roads
  mmCtx.fillStyle = '#333344';
  for (let row = 0; row < GRID; row++) {
    for (let col = 0; col < GRID; col++) {
      const cx = (col - GRID / 2) * CELL * MM_SCALE + MM_W / 2;
      const cz = (row - GRID / 2) * CELL * MM_SCALE + MM_W / 2;
      const rw = ROAD * 2 * MM_SCALE;
      mmCtx.fillRect(cx - rw / 2, 0, rw, MM_W);
      mmCtx.fillRect(0, cz - rw / 2, MM_W, rw);
    }
  }
  // Passengers
  for (const p of PASSENGERS) {
    if (p.delivered) continue;
    mmCtx.fillStyle = p.pickedUp ? '#ffd700' : '#' + p.color.toString(16).padStart(6, '0');
    const mx = p.px * MM_SCALE + MM_W / 2;
    const mz = p.pz * MM_SCALE + MM_W / 2;
    mmCtx.beginPath(); mmCtx.arc(mx, mz, 3, 0, Math.PI * 2); mmCtx.fill();
    if (p.pickedUp) {
      // Show destination
      mmCtx.strokeStyle = '#ffd700';
      mmCtx.setLineDash([2, 3]);
      mmCtx.lineWidth = 1;
      mmCtx.beginPath();
      mmCtx.moveTo(mx, mz);
      mmCtx.lineTo(p.dx * MM_SCALE + MM_W / 2, p.dz * MM_SCALE + MM_W / 2);
      mmCtx.stroke();
      mmCtx.setLineDash([]);
      mmCtx.fillStyle = '#ff6b6b';
      mmCtx.beginPath(); mmCtx.arc(p.dx * MM_SCALE + MM_W / 2, p.dz * MM_SCALE + MM_W / 2, 4, 0, Math.PI * 2); mmCtx.fill();
    }
  }
  // Coins
  mmCtx.fillStyle = '#FFD700';
  for (const coin of COINS) {
    if (coin.collected) continue;
    const mx = coin.x * MM_SCALE + MM_W / 2;
    const mz = coin.z * MM_SCALE + MM_W / 2;
    mmCtx.fillRect(mx - 1.5, mz - 1.5, 3, 3);
  }
  // Car
  const carMX = carGroup.position.x * MM_SCALE + MM_W / 2;
  const carMZ = carGroup.position.z * MM_SCALE + MM_W / 2;
  mmCtx.save();
  mmCtx.translate(carMX, carMZ);
  mmCtx.rotate(-carAngle);
  mmCtx.fillStyle = '#f59e0b';
  mmCtx.fillRect(-3, -5, 6, 10);
  mmCtx.restore();
}

// ── Main loop
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - clock.prev) / 1000, 0.05);
  clock.prev = now;
  if (gameOver) { renderer.render(scene, camera); return; }
  if (gamePaused) { renderer.render(scene, camera); return; }

  elapsed += dt;
  gameTime -= dt;
  if (gameTime <= 0) { triggerEnd(); return; }

  // ── Drive
  const steer  = (keys['ArrowLeft'] || keys['a'] || keys['A'] ? -1 : 0)
               + (keys['ArrowRight'] || keys['d'] || keys['D'] ? 1 : 0)
               + joyX;
  const accel  = (keys['ArrowUp'] || keys['w'] || keys['W'] ? 1 : 0)
               + (keys['ArrowDown'] || keys['s'] || keys['S'] ? -1 : 0)
               - joyY;

  if (accel > 0) carSpeed = Math.min(MAX_SPEED, carSpeed + ACCEL * dt);
  else if (accel < 0) carSpeed = Math.max(-MAX_SPEED * 0.4, carSpeed - BRAKE * dt);
  else carSpeed = carSpeed > 0
    ? Math.max(0, carSpeed - FRICTION * dt)
    : Math.min(0, carSpeed + FRICTION * dt);

  if (Math.abs(carSpeed) > 0.5) carAngle -= steer * TURN_SPD * (carSpeed / MAX_SPEED) * dt;

  carGroup.position.x += Math.sin(carAngle) * carSpeed * dt;
  carGroup.position.z += Math.cos(carAngle) * carSpeed * dt;
  carGroup.rotation.y  = carAngle;
  // Wheel spin feel — slight body roll
  carGroup.rotation.z  = -steer * Math.abs(carSpeed / MAX_SPEED) * 0.08;

  // Keep in bounds
  const half = MAP_W / 2 - 4;
  carGroup.position.x = Math.max(-half, Math.min(half, carGroup.position.x));
  carGroup.position.z = Math.max(-half, Math.min(half, carGroup.position.z));

  // ── Building collisions (AABB)
  const cx = carGroup.position.x, cz = carGroup.position.z;
  for (const b of BUILDINGS) {
    const overlapX = Math.abs(cx - b.x) < b.hw + 1.3;
    const overlapZ = Math.abs(cz - b.z) < b.hd + 2.5;
    if (overlapX && overlapZ) {
      // Push out on shortest axis
      const dxAmt = b.hw + 1.3 - Math.abs(cx - b.x);
      const dzAmt = b.hd + 2.5 - Math.abs(cz - b.z);
      if (dxAmt < dzAmt) {
        carGroup.position.x += Math.sign(cx - b.x) * dxAmt;
      } else {
        carGroup.position.z += Math.sign(cz - b.z) * dzAmt;
      }
      carSpeed *= 0.2;
      screenShake = Math.min(0.4, Math.abs(carSpeed) / MAX_SPEED * 0.5 + 0.08);
    }
  }

  // ── Coin collection
  for (const coin of COINS) {
    if (coin.collected) continue;
    coin.mesh.rotation.y += dt * 2;
    if (dist2(carGroup.position.x, carGroup.position.z, coin.x, coin.z) < coin.r) {
      coin.collected = true;
      coin.mesh.visible = false;
      awardCoins(5);
      showCoinToast('+5 🪙');
    }
  }

  // ── Passenger pickup & delivery
  for (const p of PASSENGERS) {
    if (p.delivered) continue;

    if (!p.pickedUp && !pickedUpPassenger) {
      if (dist2(carGroup.position.x, carGroup.position.z, p.px, p.pz) < 5) {
        p.pickedUp = true;
        pickedUpPassenger = p;
        pickupTime = elapsed;
        p.group.visible = false;
        p.dest.visible = true;
        showMsg('🛻 Passenger aboard! Head to the marker!');
      }
    }

    if (p.pickedUp && !p.delivered) {
      // Bounce destination marker
      p.dest.position.y = 0.3 + Math.sin(elapsed * 4) * 0.3;
      if (dist2(carGroup.position.x, carGroup.position.z, p.dx, p.dz) < 6) {
        p.delivered = true;
        p.dest.visible = false;
        pickedUpPassenger = null;
        faresDelivered++;
        const deliveryTime = elapsed - pickupTime;
        const speedBonus = deliveryTime < 8 ? 30 : deliveryTime < 14 ? 15 : 0;
        const fareCoins = 20 + speedBonus;
        awardCoins(fareCoins);
        if (speedBonus > 0) {
          showSpeedBonus(speedBonus);
          showMsg(`🚖 Fast Delivery! +${fareCoins} 🪙 (${faresDelivered} fares)`);
        } else {
          showMsg(`🚖 Delivered! +${fareCoins} 🪙 (${faresDelivered} fares)`);
        }
        showCoinToast(`+${fareCoins} 🪙`);
        // Respawn as new passenger
        setTimeout(() => {
          const np = makePassenger();
          PASSENGERS.push(np);
        }, 3000);
      }
    }

    // Waving animation
    if (!p.pickedUp && !p.delivered) {
      const arm = p.group.children[2];
      if (arm) arm.rotation.z = -Math.PI / 3 + Math.sin(elapsed * 4) * 0.6;
    }
  }

  // ── Camera: third-person follow
  const camDist = 20, camHeight = 14;
  const targetX = carGroup.position.x - Math.sin(carAngle) * camDist;
  const targetZ = carGroup.position.z - Math.cos(carAngle) * camDist;
  camera.position.x += (targetX - camera.position.x) * 0.1;
  camera.position.y += (camHeight - camera.position.y) * 0.08;
  camera.position.z += (targetZ - camera.position.z) * 0.1;
  if (screenShake > 0) {
    screenShake = Math.max(0, screenShake - dt * 6);
    camera.position.x += (Math.random() - 0.5) * screenShake;
    camera.position.y += (Math.random() - 0.5) * screenShake * 0.5;
    camera.position.z += (Math.random() - 0.5) * screenShake;
  }
  camera.lookAt(carGroup.position.x, 1, carGroup.position.z);

  // ── HUD update
  hudFare.textContent  = faresDelivered;
  hudTime.textContent  = Math.max(0, Math.ceil(gameTime));
  hudCoins.textContent = coinsTotal;
  speedNum.textContent = Math.round(Math.abs(carSpeed) * 5);

  if (msgTimer > 0) { msgTimer -= dt * 1000; if (msgTimer <= 0) msgBanner.classList.remove('show'); }

  drawMinimap();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
