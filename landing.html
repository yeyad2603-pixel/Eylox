<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>∞ Eylox — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#a78bfa;--green:#4ade80;--pink:#f472b6;--yellow:#fde68a;--blue:#4fc3f7;
  --bg:#07011a;--card:#120630;--border:#2a1560;--text:#f0e8ff;--muted:#9d8ec7;
  --font-h:'Fredoka One',cursive;--font-b:'Nunito',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b)}

/* ── Starfield ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.15;pointer-events:none;z-index:0}
.orb1{width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent);top:-180px;left:-140px;animation:drift 14s ease-in-out infinite alternate}
.orb2{width:500px;height:500px;background:radial-gradient(circle,#ec4899,transparent);bottom:-120px;right:-120px;animation:drift 11s ease-in-out infinite alternate;animation-delay:-5s}
.orb3{width:420px;height:420px;background:radial-gradient(circle,#0ea5e9,transparent);top:35%;left:45%;animation:drift 16s ease-in-out infinite alternate;animation-delay:-9s}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(50px,35px)}}

/* ══════════════════════
   LANDING SCREEN
══════════════════════ */
#landingScreen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
  transition:opacity .5s,transform .5s;
}
#landingScreen.slide-out{opacity:0;transform:translateY(-30px);pointer-events:none}

.logo-wrap{margin-bottom:4px}
.logo-icon{font-size:clamp(3.5rem,10vw,5.5rem);display:block;animation:bounce 3s ease-in-out infinite;filter:drop-shadow(0 0 28px #a78bfa88)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.logo-text{
  font-family:var(--font-h);font-size:clamp(3rem,11vw,5.6rem);
  background:linear-gradient(135deg,#d4b8ff,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:3px;line-height:1;display:block
}

.tagline{font-size:clamp(.95rem,3vw,1.2rem);color:#c4b5fd;font-weight:700;margin:10px 0 0;letter-spacing:.5px}
.tagline span{color:var(--yellow)}

/* Game chip strip */
.thumbs{display:flex;gap:12px;margin:26px 0 34px;align-items:center;justify-content:center;flex-wrap:wrap}
.thumb-chip{
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);
  border-radius:18px;padding:10px 16px;font-size:1.6rem;
  animation:chipFloat var(--d,3s) ease-in-out infinite alternate;animation-delay:var(--dl,0s);
  transition:transform .2s,background .2s;cursor:default
}
.thumb-chip:hover{background:rgba(167,139,250,.22);transform:scale(1.12)}
@keyframes chipFloat{0%{transform:translateY(0)}100%{transform:translateY(-9px)}}

/* CTA buttons */
.cta-group{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}
.cta-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px 28px;border-radius:99px;border:none;
  font-family:var(--font-b);font-weight:800;font-size:1.05rem;
  cursor:pointer;transition:transform .2s,box-shadow .2s,filter .2s;
  text-decoration:none;position:relative;overflow:hidden;
}
.cta-btn:active{transform:scale(.96)!important}
.cta-btn:hover{transform:translateY(-3px);filter:brightness(1.1)}
.btn-login {background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;box-shadow:0 6px 28px rgba(124,58,237,.5)}
.btn-signup{background:linear-gradient(135deg,#059669,#4ade80);color:#fff;box-shadow:0 6px 28px rgba(74,222,128,.45)}
.btn-guest {background:rgba(167,139,250,.1);border:2px solid rgba(167,139,250,.3)!important;color:#c4b5fd}
.btn-icon{font-size:1.3rem;flex-shrink:0}

.bottom-note{margin-top:24px;color:rgba(200,185,255,.32);font-size:.76rem;font-weight:700;line-height:1.8}

@media(min-width:560px){.cta-group{flex-direction:row;max-width:none;justify-content:center}.cta-btn{width:auto;min-width:170px}}
@media(max-width:400px){.thumbs{gap:8px}.thumb-chip{padding:8px 12px;font-size:1.3rem}}

/* ══════════════════════
   AUTH MODAL
══════════════════════ */
#authModal{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:rgba(4,0,16,.7);backdrop-filter:blur(18px);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
#authModal.open{opacity:1;pointer-events:all}

.auth-card{
  background:rgba(18,6,48,.96);border:1px solid rgba(167,139,250,.28);
  border-radius:24px;padding:clamp(28px,5vw,40px) clamp(24px,5vw,40px);
  width:100%;max-width:420px;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:translateY(20px) scale(.97);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
#authModal.open .auth-card{transform:translateY(0) scale(1)}

.auth-close{
  position:absolute;top:16px;right:16px;background:rgba(167,139,250,.14);
  border:1px solid rgba(167,139,250,.25);color:var(--purple);
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.auth-close:hover{background:rgba(167,139,250,.32)}

.auth-brand{font-size:2rem;margin-bottom:4px;display:block;text-align:center}
.auth-title{font-family:var(--font-h);font-size:1.5rem;text-align:center;margin-bottom:4px}
.auth-sub{color:var(--muted);font-size:.82rem;font-weight:700;text-align:center;margin-bottom:20px}

/* Tab pills */
.auth-tabs{display:flex;gap:0;margin-bottom:22px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.auth-tab{flex:1;padding:10px;background:transparent;color:var(--muted);border:none;font-family:var(--font-b);font-weight:800;font-size:.88rem;cursor:pointer;transition:background .15s,color .15s}
.auth-tab.active{background:rgba(167,139,250,.2);color:var(--purple)}

/* Error banner */
.auth-err{display:none;background:rgba(244,114,182,.1);border:1px solid var(--pink);border-radius:10px;padding:10px 14px;color:var(--pink);font-size:.83rem;font-weight:700;margin-bottom:14px}
.auth-ok {display:none;background:rgba(74,222,128,.1);border:1px solid var(--green);border-radius:10px;padding:10px 14px;color:var(--green);font-size:.83rem;font-weight:700;margin-bottom:14px}

/* Form fields */
.f-group{margin-bottom:14px}
.f-label{display:block;font-size:.78rem;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.f-input{
  width:100%;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);
  border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--font-b);
  font-weight:700;font-size:.95rem;outline:none;transition:border-color .18s,background .18s;
}
.f-input:focus{border-color:var(--purple);background:rgba(167,139,250,.14)}
.f-input::placeholder{color:var(--muted);opacity:.6}
.f-err{display:none;color:var(--pink);font-size:.76rem;font-weight:700;margin-top:4px}

/* Submit button */
.auth-submit{
  width:100%;padding:14px;border-radius:99px;border:none;
  font-family:var(--font-b);font-weight:800;font-size:1rem;
  cursor:pointer;margin-top:6px;transition:transform .18s,filter .18s;
}
.auth-submit:hover{transform:translateY(-2px);filter:brightness(1.1)}
.auth-submit:active{transform:scale(.97)}
.auth-submit.login-btn {background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.45)}
.auth-submit.signup-btn{background:linear-gradient(135deg,#059669,#4ade80);color:#fff;box-shadow:0 4px 20px rgba(74,222,128,.4)}

.auth-divider{text-align:center;color:var(--muted);font-size:.78rem;font-weight:700;margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}

.auth-guest{
  width:100%;padding:12px;border-radius:99px;border:1px solid rgba(167,139,250,.28);
  background:rgba(167,139,250,.07);color:var(--muted);font-family:var(--font-b);
  font-weight:800;font-size:.88rem;cursor:pointer;transition:background .15s,color .15s;
}
.auth-guest:hover{background:rgba(167,139,250,.18);color:var(--purple)}

.auth-switch{text-align:center;margin-top:14px;color:var(--muted);font-size:.8rem;font-weight:700}
.auth-switch a{color:var(--purple);text-decoration:none;font-weight:800}
.auth-switch a:hover{text-decoration:underline}

/* Password eye toggle */
.pw-wrap{position:relative}
.pw-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:4px}

/* Loading spinner on submit */
.auth-submit.loading{opacity:.7;pointer-events:none}

/* ── Loading screen ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .6s}
#loadScreen.out{opacity:0;pointer-events:none}
.ls-icon{font-size:4rem;animation:lsPulse 1.1s ease-in-out infinite}
@keyframes lsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18);filter:brightness(1.4)}}
.ls-bar{width:180px;height:4px;background:rgba(167,139,250,.18);border-radius:99px;overflow:hidden}
.ls-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:99px;width:0;animation:lsLoad .9s ease .2s forwards}
@keyframes lsLoad{to{width:100%}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loadScreen">
  <div class="ls-icon">🎮</div>
  <div class="ls-bar"><div class="ls-fill"></div></div>
</div>

<!-- Starfield + orbs -->
<canvas id="stars"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- ══════════════════ LANDING HERO ══════════════════ -->
<div id="landingScreen">
  <div class="logo-wrap">
    <span class="logo-icon">🎮</span>
    <span class="logo-text">Eylox</span>
  </div>

  <p class="tagline">The <span>infinite</span> gaming universe — built for everyone</p>

  <div class="thumbs">
    <div class="thumb-chip" style="--d:3.2s;--dl:0s">✈️</div>
    <div class="thumb-chip" style="--d:2.8s;--dl:-.5s">🥷</div>
    <div class="thumb-chip" style="--d:3.6s;--dl:-.9s">🚀</div>
    <div class="thumb-chip" style="--d:3.0s;--dl:-1.3s">🌊</div>
    <div class="thumb-chip" style="--d:2.6s;--dl:-1.7s">🐉</div>
    <div class="thumb-chip" style="--d:3.4s;--dl:-2.1s">🏰</div>
    <div class="thumb-chip" style="--d:3.0s;--dl:-2.5s">🎃</div>
    <div class="thumb-chip" style="--d:2.8s;--dl:-2.9s">🧩</div>
  </div>

  <div class="cta-group">
    <button class="cta-btn btn-login"  id="btnShowLogin">
      <span class="btn-icon">🔑</span> Log In
    </button>
    <button class="cta-btn btn-signup" id="btnShowSignup">
      <span class="btn-icon">✨</span> Sign Up
    </button>
    <button class="cta-btn btn-guest"  id="btnGuest">
      <span class="btn-icon">🎮</span> Play as Guest
    </button>
  </div>

  <p class="bottom-note">16 games · free forever · no download needed</p>
</div>

<!-- ══════════════════ AUTH MODAL ══════════════════ -->
<div id="authModal">
  <div class="auth-card">

    <button class="auth-close" id="authClose" aria-label="Close">✕</button>
    <span class="auth-brand" id="authBrand">🎮</span>
    <div class="auth-title" id="authTitle">Welcome back!</div>
    <p class="auth-sub" id="authSub">Sign in to your Eylox account</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"    onclick="switchTab('login')">🔑 Log In</button>
      <button class="auth-tab"        id="tabRegister" onclick="switchTab('register')">✨ Sign Up</button>
    </div>

    <!-- Error / success banners -->
    <div class="auth-err" id="authErr"></div>
    <div class="auth-ok"  id="authOk"></div>

    <!-- ── LOGIN FORM ── -->
    <form id="loginForm" autocomplete="on">
      <div class="f-group">
        <label class="f-label" for="lUsername">👤 Username</label>
        <input class="f-input" id="lUsername" type="text" placeholder="Your username" autocomplete="username"/>
        <p class="f-err" id="lErrUser">Enter your username</p>
      </div>
      <div class="f-group">
        <label class="f-label" for="lPassword">🔒 Password</label>
        <div class="pw-wrap">
          <input class="f-input" id="lPassword" type="password" placeholder="Your password" autocomplete="current-password" style="padding-right:46px"/>
          <button type="button" class="pw-eye" id="lEye">👁</button>
        </div>
        <p class="f-err" id="lErrPass">Enter your password</p>
      </div>
      <button type="submit" class="auth-submit login-btn" id="loginBtn">🔑 Log In &amp; Play!</button>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form id="registerForm" autocomplete="on" style="display:none">
      <div class="f-group">
        <label class="f-label" for="rUsername">👤 Choose a Username</label>
        <input class="f-input" id="rUsername" type="text" placeholder="e.g. CoolGamer99" autocomplete="username"/>
        <p style="color:var(--muted);font-size:.74rem;font-weight:700;margin-top:4px">3–20 chars, letters/numbers/underscores</p>
        <p class="f-err" id="rErrUser"></p>
      </div>
      <div class="f-group">
        <label class="f-label" for="rEmail">📧 Email</label>
        <input class="f-input" id="rEmail" type="email" placeholder="you@email.com" autocomplete="email"/>
        <p class="f-err" id="rErrEmail"></p>
      </div>
      <div class="f-group">
        <label class="f-label" for="rPassword">🔒 Password</label>
        <div class="pw-wrap">
          <input class="f-input" id="rPassword" type="password" placeholder="Min 6 characters" autocomplete="new-password" style="padding-right:46px"/>
          <button type="button" class="pw-eye" id="rEye">👁</button>
        </div>
        <p class="f-err" id="rErrPass"></p>
      </div>
      <button type="submit" class="auth-submit signup-btn" id="registerBtn">✨ Create Account!</button>
    </form>

    <div class="auth-divider">or</div>
    <button class="auth-guest" id="authGuestBtn">🎮 Play as Guest</button>

    <p class="auth-switch" id="authSwitch">
      New here? <a href="#" onclick="switchTab('register');return false">Create a free account →</a>
    </p>

  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   SKIP IF ALREADY LOGGED IN
══════════════════════════════════════════════════ */
try {
  const hasToken = localStorage.getItem('eylox_token');
  const hasGuest = localStorage.getItem('eylox_guest');
  if (hasToken || hasGuest) window.location.replace('index.html');
} catch {}

/* ══════════════════════════════════════════════════
   API HELPERS (inline — no api.js dependency here)
══════════════════════════════════════════════════ */
const API = 'http://localhost:3001/api';

async function apiPost(path, body) {
  try {
    const res  = await fetch(API + path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch(e) {
    if (e.name === 'TypeError') return null; // server offline
    throw e;
  }
}

function setSession(data, username) {
  if (data?.token) {
    /* Server responded with real token */
    localStorage.setItem('eylox_token', data.token);
    /* Merge any locally saved coins/wins back so server round-trips don't wipe local progress */
    try {
      const saved = JSON.parse(localStorage.getItem('eylox_userdata_' + data.user.username));
      if (saved && (saved.coins > (data.user.coins || 0) || saved.wins > (data.user.wins || 0))) {
        data.user.coins = Math.max(saved.coins || 0, data.user.coins || 0);
        data.user.wins  = Math.max(saved.wins  || 0, data.user.wins  || 0);
      }
    } catch {}
    localStorage.setItem('eylox_user', JSON.stringify(data.user));
    /* Keep per-user backup in sync */
    localStorage.setItem('eylox_userdata_' + data.user.username, JSON.stringify(data.user));
    localStorage.removeItem('eylox_guest');
  } else {
    /* Server offline — restore this user's saved data (coins/wins persist between sessions) */
    let localUser;
    try {
      const saved = JSON.parse(localStorage.getItem('eylox_userdata_' + username));
      if (saved && saved.username === username) {
        localUser = saved; /* restore full saved profile */
      }
    } catch {}
    if (!localUser) {
      localUser = {
        _id: 'local_' + username,
        username,
        avatar: '🎮',
        coins: 100,
        wins: 0,
        badges: ['New Player'],
        recentlyPlayed: [],
      };
    }
    const offlineToken = 'offline_' + Date.now() + '_' + username;
    localStorage.setItem('eylox_token', offlineToken);
    localStorage.setItem('eylox_user',  JSON.stringify(localUser));
    localStorage.setItem('eylox_userdata_' + username, JSON.stringify(localUser));
    localStorage.removeItem('eylox_guest');
  }
}

/* ══════════════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  setTimeout(() => {
    const ls = document.getElementById('loadScreen');
    ls.classList.add('out');
    setTimeout(() => ls.remove(), 650);
  }, 950);
});

/* ══════════════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════════════ */
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');
let stars    = [];
function initStars() {
  canvas.width = innerWidth; canvas.height = innerHeight;
  stars = Array.from({length:130}, () => ({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*1.7+.2, o:Math.random(),
    do:(Math.random()-.5)*.014, dx:(Math.random()-.5)*.07,
  }));
}
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    s.o = Math.max(.04,Math.min(1,s.o+s.do));
    if(s.o<=.05||s.o>=.99)s.do*=-1;
    s.x=(s.x+s.dx+canvas.width)%canvas.width;
    ctx.fillStyle=`rgba(255,255,255,${s.o})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars, {passive:true});
initStars(); drawStars();

/* ══════════════════════════════════════════════════
   MODAL OPEN / CLOSE
══════════════════════════════════════════════════ */
const modal   = document.getElementById('authModal');
const landing = document.getElementById('landingScreen');

function openModal(tab) {
  landing.classList.add('slide-out');
  modal.classList.add('open');
  switchTab(tab || 'login');
  clearErrors();
}
function closeModal() {
  modal.classList.remove('open');
  landing.classList.remove('slide-out');
}

document.getElementById('btnShowLogin') .addEventListener('click', () => openModal('login'));
document.getElementById('btnShowSignup').addEventListener('click', () => openModal('register'));
document.getElementById('authClose')    .addEventListener('click', closeModal);
modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ══════════════════════════════════════════════════
   TAB SWITCH
══════════════════════════════════════════════════ */
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
  document.getElementById('tabLogin').classList.toggle('active',  isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('authTitle').textContent = isLogin ? 'Welcome back!' : 'Join Eylox!';
  document.getElementById('authSub').textContent   = isLogin ? 'Sign in to your Eylox account' : 'Create your free account in seconds';
  document.getElementById('authBrand').textContent = isLogin ? '🔑' : '✨';
  document.getElementById('authSwitch').innerHTML  = isLogin
    ? 'New here? <a href="#" onclick="switchTab(\'register\');return false">Create a free account →</a>'
    : 'Already have an account? <a href="#" onclick="switchTab(\'login\');return false">Log in →</a>';
  clearErrors();
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function clearErrors() {
  ['authErr','authOk','lErrUser','lErrPass','rErrUser','rErrEmail','rErrPass'].forEach(id => {
    const el = document.getElementById(id);
    if(el){ el.style.display='none'; el.textContent=''; }
  });
}
function showErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = '❌ ' + msg; el.style.display = 'block';
  document.getElementById('authOk').style.display = 'none';
}
function showOk(msg) {
  const el = document.getElementById('authOk');
  el.textContent = '✅ ' + msg; el.style.display = 'block';
  document.getElementById('authErr').style.display = 'none';
}
function fieldErr(id, msg) {
  const el = document.getElementById(id);
  if(el){ el.textContent=msg; el.style.display='block'; }
}
function setLoading(btn, loading, label) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  if(!loading) btn.textContent = label;
}

/* Password eye toggles */
document.getElementById('lEye').addEventListener('click', () => {
  const inp = document.getElementById('lPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});
document.getElementById('rEye').addEventListener('click', () => {
  const inp = document.getElementById('rPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

/* ── Restore per-user shop data on login (so purchases survive re-login) ── */
function restoreShopData(username) {
  try {
    const key  = 'eylox_shopdata_' + username;
    const saved = JSON.parse(localStorage.getItem(key) || 'null');
    if (!saved) return;                  // first time — nothing to restore
    if (saved.owned)    localStorage.setItem('eylox_owned_items', JSON.stringify(saved.owned));
    if (saved.equipped) localStorage.setItem('eylox_equipped',    JSON.stringify(saved.equipped));
    if (saved.inventory)localStorage.setItem('eylox_inventory',   JSON.stringify(saved.inventory));
  } catch {}
}

/* ── Record login to history ── */
function recordLogin(username) {
  try {
    const history = JSON.parse(localStorage.getItem('eylox_login_history') || '[]');
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    history.unshift({ username, time: Date.now(), device: isMobile ? '📱 Mobile' : '💻 Desktop' });
    localStorage.setItem('eylox_login_history', JSON.stringify(history.slice(0, 200)));
  } catch {}
}

/* ══════════════════════════════════════════════════
   LOGIN FORM
══════════════════════════════════════════════════ */
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  clearErrors();
  const username = document.getElementById('lUsername').value.trim();
  const password = document.getElementById('lPassword').value;
  let ok = true;
  if (!username) { fieldErr('lErrUser', 'Please enter your username'); ok = false; }
  if (!password) { fieldErr('lErrPass', 'Please enter your password');  ok = false; }
  if (!ok) return;

  const btn = document.getElementById('loginBtn');
  setLoading(btn, true, '');
  btn.textContent = '⏳ Logging in…';

  try {
    /* Owner check — must match exact credentials */
    if (username.toLowerCase() === 'eylox' && password === 'EyadYasser') {
      localStorage.setItem('eylox_is_owner', 'true');
    } else {
      localStorage.removeItem('eylox_is_owner');
    }
    recordLogin(username);
    const data = await apiPost('/auth/login', { username, password });
    if (data) {
      setSession(data, username);
      restoreShopData(username);                          /* keep purchases */
      localStorage.removeItem('eylox_recently_played');  /* fresh Continue Playing each session */
      showOk('Welcome back, ' + username + '! 👋');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } else {
      /* Server offline → local session */
      setSession(null, username);
      restoreShopData(username);
      localStorage.removeItem('eylox_recently_played');
      showOk('Logged in as ' + username + ' (offline mode)');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);
    }
  } catch(err) {
    showErr(err.message || 'Login failed. Check your details.');
    setLoading(btn, false, '🔑 Log In & Play!');
  }
});

/* ══════════════════════════════════════════════════
   REGISTER FORM
══════════════════════════════════════════════════ */
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  clearErrors();
  const username = document.getElementById('rUsername').value.trim();
  const email    = document.getElementById('rEmail').value.trim();
  const password = document.getElementById('rPassword').value;
  let ok = true;
  if (!username)       { fieldErr('rErrUser',  'Username is required'); ok = false; }
  else if (username.length < 3) { fieldErr('rErrUser', 'Min 3 characters'); ok = false; }
  if (!email)          { fieldErr('rErrEmail', 'Email is required');    ok = false; }
  if (!password)       { fieldErr('rErrPass',  'Password is required'); ok = false; }
  else if (password.length < 6) { fieldErr('rErrPass', 'Min 6 characters'); ok = false; }
  if (!ok) return;

  const btn = document.getElementById('registerBtn');
  setLoading(btn, true, '');
  btn.textContent = '⏳ Creating account…';

  try {
    localStorage.removeItem('eylox_is_owner'); /* new accounts are never owner */
    /* ── Fresh account → wipe any leftover shop + play data from a previous session ── */
    localStorage.removeItem('eylox_owned_items');
    localStorage.removeItem('eylox_equipped');
    localStorage.removeItem('eylox_inventory');
    localStorage.removeItem('eylox_recently_played');
    recordLogin(username);
    const data = await apiPost('/auth/register', { username, email, password });
    if (data) {
      setSession(data, username);
      showOk('Account created! Welcome, ' + username + '! 🎉');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);
    } else {
      setSession(null, username);
      showOk('Account created! Welcome, ' + username + '! 🎉');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);
    }
  } catch(err) {
    showErr(err.message || 'Could not create account. Try again!');
    setLoading(btn, false, '✨ Create Account!');
  }
});

/* ══════════════════════════════════════════════════
   GUEST BUTTONS
══════════════════════════════════════════════════ */
function playAsGuest() {
  localStorage.setItem('eylox_guest', '1');
  if (!localStorage.getItem('eylox_user')) {
    localStorage.setItem('eylox_user', JSON.stringify({
      _id:'guest_'+Date.now(), username:'Guest',
      avatar:'🎮', coins:100, wins:0, badges:[], recentlyPlayed:[],
    }));
  }
  window.location.href = 'index.html';
}
document.getElementById('btnGuest')     .addEventListener('click', playAsGuest);
document.getElementById('authGuestBtn') .addEventListener('click', playAsGuest);
</script>
